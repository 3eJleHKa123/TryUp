<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TradeMarket Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ========== БАЗОВЫЕ ПЕРЕМЕННЫЕ ========== */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #3b82f6;
            --accent-glow: rgba(59,130,246,0.5);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: rgba(255,255,255,0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* ========== АНИМАЦИИ ========== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px var(--accent-glow); }
            50% { box-shadow: 0 0 20px var(--accent-glow); }
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .animate-in {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        
        /* ========== ГЛАССМОРФИЗМ ========== */
        .glass {
            background: rgba(26, 26, 42, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
        }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(26,26,42,0.9) 0%, rgba(18,18,26,0.95) 100%);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .glass-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        /* ========== НЕОНОВЫЕ КНОПКИ ========== */
        .btn-neon {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-neon::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-neon:hover::before {
            left: 100%;
        }
        
        .btn-neon:active {
            transform: scale(0.98);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-outline:active {
            background: var(--accent);
            color: white;
        }
        
        /* ========== КАРТОЧКИ СЕРВЕРОВ ========== */
        .server-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            padding: 4px;
        }
        
        .server-card {
            background: linear-gradient(135deg, #1a1a2a 0%, #12121a 100%);
            border-radius: 20px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        
        .server-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(59,130,246,0.2) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .server-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }
        
        .server-card:hover::after {
            opacity: 1;
        }
        
        .server-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .server-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .server-id {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        /* ========== КАРТОЧКИ ТОВАРОВ ========== */
        .item-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        
        .item-card:active {
            transform: scale(0.98);
        }
        
        /* ========== ВКЛАДКИ ========== */
        .tabs {
            display: flex;
            gap: 8px;
            background: var(--bg-secondary);
            padding: 8px;
            border-radius: 40px;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 32px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            color: var(--text-secondary);
        }
        
        .tab.active {
            background: var(--accent);
            color: white;
        }
        
        /* ========== ФОРМЫ ========== */
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        
        /* ========== ЗВЁЗДЫ РЕЙТИНГА ========== */
        .stars {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }
        
        .star {
            font-size: 32px;
            cursor: pointer;
            color: #4a4a5a;
            transition: all 0.2s;
        }
        
        .star.active {
            color: #fbbf24;
            text-shadow: 0 0 10px #fbbf24;
        }
        
        /* ========== СТАТУСЫ ========== */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-pending { background: var(--warning); color: #1a1a2a; }
        .status-completed { background: var(--success); color: white; }
        .status-cancelled { background: var(--danger); color: white; }
        
        /* ========== РАНГИ ========== */
        .rank-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .rank-novice { background: linear-gradient(135deg, #4caf50, #2e7d32); }
        .rank-trader { background: linear-gradient(135deg, #ff9800, #ed6c02); }
        .rank-master { background: linear-gradient(135deg, #9c27b0, #7b1fa2); }
        .rank-legend { background: linear-gradient(135deg, #f44336, #d32f2f); }
        
        /* ========== ПРОФИЛЬ ========== */
        .profile-header {
            background: linear-gradient(135deg, #1e1e3a, #0f0f1a);
            border-radius: 32px;
            padding: 24px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .profile-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
            animation: pulse 3s infinite;
        }
        
        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 16px;
            position: relative;
            z-index: 1;
        }
        
        /* ========== СКЕЛЕТОН ========== */
        .skeleton {
            background: linear-gradient(90deg, #1a1a2a 25%, #2a2a3a 50%, #1a1a2a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 16px;
            height: 100px;
            margin-bottom: 12px;
        }
        
        /* ========== УТИЛИТЫ ========== */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 80px;
        }
        
        .hidden {
            display: none;
        }
        
        .text-gradient {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .mt-2 { margin-top: 8px; }
        .mt-3 { margin-top: 12px; }
        .mt-4 { margin-top: 16px; }
        .mb-2 { margin-bottom: 8px; }
        .mb-3 { margin-bottom: 12px; }
        .mb-4 { margin-bottom: 16px; }
        .gap-2 { gap: 8px; }
        .flex { display: flex; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .text-center { text-align: center; }
        .text-secondary { color: var(--text-secondary); }
        .text-accent { color: var(--accent); }
    </style>
</head>

            {id:86,name:"SURGUT",color:"#4F27DE"},
            {id:87,name:"PODOLSK",color:"#B7A67E"},
            {id:88,name:"MAGADAN",color:"#B1C1C7"},
            {id:89,name:"CHEREPOVETS",color:"#3885E9"},
            {id:90,name:"NORILSK",color:"#AED4F6"}
        ];
        
        // ========== СОСТОЯНИЕ ==========
        let state = {
            view: 'servers',
            currentServer: null,
            user: null,
            items: [],
            myOrders: [],
            loading: false,
            currentCategory: 'all'
        };
        
        // ========== ФУНКЦИИ ОБЩЕНИЯ С БОТОМ ==========
        function callBot(action, data = {}) {
            return new Promise((resolve) => {
                const id = Date.now() + '_' + Math.random();
                window[id] = resolve;
                tg.sendData(JSON.stringify({ action, ...data, _id: id }));
                setTimeout(() => {
                    if (window[id]) { delete window[id]; resolve(null); }
                }, 10000);
            });
        }
        
        function showToast(msg, type = 'info') {
            tg.showPopup({
                title: type === 'success' ? '✅ Успех' : type === 'error' ? '❌ Ошибка' : 'ℹ️ Информация',
                message: msg,
                buttons: [{type: 'ok'}]
            });
        }
        
        // ========== ЗАГРУЗКА ДАННЫХ ==========
        async function loadProfile() {
            const res = await callBot('get_profile');
            if (res) { state.user = res; render(); }
        }
        
        async function loadItems() {
            if (!state.currentServer) return;
            state.loading = true;
            render();
            const res = await callBot('get_items', { 
                server_id: state.currentServer.id,
                category: state.currentCategory === 'all' ? null : state.currentCategory
            });
            if (res) state.items = res;
            state.loading = false;
            render();
        }
        
        async function loadMyOrders() {
            const res = await callBot('my_orders');
            if (res) state.myOrders = res;
            render();
        }
        
        async function createItem(data) {
            const res = await callBot('create_item', data);
            if (res?.success) {
                showToast('Объявление опубликовано!', 'success');
                await loadItems();
                state.view = 'market';
                render();
            } else {
                showToast('Ошибка: ' + (res?.error || 'Неизвестная ошибка'), 'error');
            }
        }
        
        async function buyItem(itemId) {
            const res = await callBot('buy_item', { item_id: itemId });
            if (res?.success) {
                showToast('Сделка создана!', 'success');
                await loadMyOrders();
                render();
            } else {
                showToast('Ошибка: ' + (res?.error || 'Не удалось'), 'error');
            }
        }
        
        async function confirmOrder(orderId) {
            const res = await callBot('confirm_order', { order_id: orderId });
            if (res?.success) {
                showToast('Сделка завершена!', 'success');
                await loadMyOrders();
                await loadProfile();
                render();
            } else {
                showToast('Ошибка подтверждения', 'error');
            }
        }
        
        // ========== РАНГИ ==========
        function getRankClass(deals) {
            if (deals >= 50) return 'rank-legend';
            if (deals >= 20) return 'rank-master';
            if (deals >= 5) return 'rank-trader';
            return 'rank-novice';
        }
        
        function getRankName(deals) {
            if (deals >= 50) return '👑 ЛЕГЕНДА';
            if (deals >= 20) return '⭐ МАСТЕР';
            if (deals >= 5) return '🌟 ТОРГОВЕЦ';
            return '🌱 НОВИЧОК';
        }
        
        // ========== ОТРИСОВКА ==========
        
        function renderServers() {
            return `
                <div class="animate-in">
                    <h1 class="text-gradient" style="font-size: 32px; font-weight: 800; margin-bottom: 8px;">TradeMarket</h1>
                    <p class="text-secondary" style="margin-bottom: 24px;">Выберите сервер для торговли</p>
                    <div class="server-grid">
                        ${SERVERS.map(s => `
                            <div class="server-card" data-id="${s.id}" style="border-top: 3px solid ${s.color}">
                                <div class="server-icon">🎮</div>
                                <div class="server-name">${s.name}</div>
                                <div class="server-id">ID ${s.id}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function renderMarket() {
            const categories = [
                {id:'all',name:'Все',icon:'📦'},
                {id:'car',name:'Машины',icon:'🚗'},
                {id:'house',name:'Дома',icon:'🏠'},
                {id:'skin',name:'Скины',icon:'🎨'},
                {id:'money',name:'Валюта',icon:'💰'},
                {id:'accessory',name:'Аксессуары',icon:'💎'}
            ];
            
            return `
                <div class="animate-in">
                    <div class="flex-between" style="margin-bottom: 16px;">
                        <button onclick="window.navigate('servers')" class="btn-outline" style="padding: 8px 16px;">← Назад</button>
                        <h2 style="font-size: 20px; font-weight: bold; color: ${state.currentServer?.color}">${state.currentServer?.name}</h2>
                        <button onclick="window.navigate('create')" class="btn-neon" style="padding: 8px 16px; font-size: 14px;">➕ Продать</button>
                    </div>
                    
                    <div class="tabs" style="margin-bottom: 20px;">
                        ${categories.map(cat => `
                            <div class="tab ${state.currentCategory === cat.id ? 'active' : ''}" onclick="window.setCategory('${cat.id}')">
                                ${cat.icon} ${cat.name}
                            </div>
                        `).join('')}
                    </div>
                    
                    ${state.loading ? `
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                        <div class="skeleton"></div>
                    ` : state.items.length === 0 ? `
                        <div class="glass-card" style="padding: 48px; text-align: center;">
                            <div style="font-size: 48px; margin-bottom: 16px;">📭</div>
                            <p class="text-secondary">Нет объявлений на этом сервере</p>
                            <button onclick="window.navigate('create')" class="btn-neon" style="margin-top: 20px;">Создать первое</button>
                        </div>
                    ` : state.items.map(item => `
                        <div class="item-card">
                            <div class="flex-between" style="margin-bottom: 8px;">
                                <span class="status-badge" style="background: ${state.currentServer?.color}20; color: ${state.currentServer?.color}">${state.currentServer?.name}</span>
                                <span class="text-secondary" style="font-size: 12px;">⭐ ${item.seller_rating || 0}</span>
                            </div>
                            <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 4px;">${item.name}</h3>
                            <p class="text-secondary" style="font-size: 14px; margin-bottom: 12px;">${item.description || 'Без описания'}</p>
                            <div class="flex-between">
                                <span style="font-size: 24px; font-weight: bold; color: var(--accent);">${item.price?.toLocaleString() || 0} 💰</span>
                                <button onclick="window.buyItem('${item.item_id}')" class="btn-neon" style="padding: 10px 20px;">Купить</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderProfile() {
            const u = state.user || { first_name: 'Загрузка...', rating: 0, deals: 0, seller_deals: 0, buyer_deals: 0 };
            const rankClass = getRankClass(u.deals || 0);
            const rankName = getRankName(u.deals || 0);
            
            return `
                <div class="animate-in">
                    <div class="flex-between" style="margin-bottom: 20px;">
                        <button onclick="window.navigate('servers')" class="btn-outline" style="padding: 8px 16px;">← Назад</button>
                        <h2 class="text-gradient">Мой профиль</h2>
                        <button onclick="window.loadProfile()" class="btn-outline" style="padding: 8px 12px;">🔄</button>
                    </div>
                    
                    <div class="profile-header">
                        <div class="avatar">${u.first_name?.charAt(0) || '👤'}</div>
                        <h3 style="font-size: 20px; font-weight: bold;">${u.first_name}</h3>
                        <p class="text-secondary">@${u.username || 'user'}</p>
                        <div class="rank-badge ${rankClass}" style="display: inline-flex; margin-top: 12px;">${rankName}</div>
                    </div>
                    
                    <div class="grid-2" style="margin-bottom: 20px;">
                        <div class="glass-card" style="padding: 16px; text-align: center;">
                            <div style="font-size: 28px; font-weight: bold; color: var(--accent);">${u.rating || 0}</div>
                            <div class="text-secondary">⭐ Рейтинг</div>
                        </div>
                        <div class="glass-card" style="padding: 16px; text-align: center;">
                            <div style="font-size: 28px; font-weight: bold; color: #10b981;">${u.deals || 0}</div>
                            <div class="text-secondary">📦 Сделок</div>
                        </div>
                        <div class="glass-card" style="padding: 16px; text-align: center;">
                            <div style="font-size: 28px; font-weight: bold; color: #f59e0b;">${u.seller_deals || 0}</div>
                            <div class="text-secondary">🛒 Продаж</div>
                        </div>
                        <div class="glass-card" style="padding: 16px; text-align: center;">
                            <div style="font-size: 28px; font-weight: bold; color: #8b5cf6;">${u.buyer_deals || 0}</div>
                            <div class="text-secondary">💰 Покупок</div>
                        </div>
                    </div>
                    
                    <button onclick="window.navigate('orders')" class="glass-card" style="width: 100%; padding: 16px; display: flex; justify-content: space-between; margin-bottom: 12px;">
                        <span>📋 Мои сделки</span>
                        <span class="text-secondary">${state.myOrders.length} →</span>
                    </button>
                    
                    <button onclick="window.navigate('create')" class="btn-neon" style="width: 100%;">➕ Продать товар</button>
                </div>
            `;
        }
        
        function renderOrders() {
            if (state.myOrders.length === 0) {
                return `
                    <div class="animate-in">
                        <div class="flex-between" style="margin-bottom: 20px;">
                            <button onclick="window.navigate('profile')" class="btn-outline" style="padding: 8px 16px;">← Назад</button>
                            <h2 class="text-gradient">Мои сделки</h2>
                            <div style="width: 40px;"></div>
                        </div>
                        <div class="glass-card" style="padding: 48px; text-align: center;">
                            <div style="font-size: 48px;">📭</div>
                            <p class="text-secondary">Нет активных сделок</p>
                        </div>
                    </div>
                `;
            }
            
            return `
                <div class="animate-in">
                    <div class="flex-between" style="margin-bottom: 20px;">
                        <button onclick="window.navigate('profile')" class="btn-outline" style="padding: 8px 16px;">← Назад</button>
                        <h2 class="text-gradient">Мои сделки</h2>
                        <button onclick="window.loadMyOrders()" class="btn-outline" style="padding: 8px 12px;">🔄</button>
                    </div>
                    
                    ${state.myOrders.map(order => `
                        <div class="glass-card" style="padding: 16px; margin-bottom: 12px;">
                            <div class="flex-between" style="margin-bottom: 8px;">
                                <span style="font-weight: 600;">${order.item_name}</span>
                                <span class="status-badge ${order.status === 'completed' ? 'status-completed' : 'status-pending'}">
                                    ${order.status === 'pending' ? '⏳ Ожидает' : order.status === 'completed' ? '✅ Завершено' : '❌ Отменено'}
                                </span>
                            </div>
                            <div class="text-secondary" style="font-size: 14px; margin-bottom: 8px;">
                                ${order.is_buyer ? 'Вы покупаете у' : 'Вы продаёте'} @${order.other_user}
                            </div>
                            <div style="font-size: 20px; font-weight: bold; color: var(--accent); margin-bottom: 12px;">${order.price?.toLocaleString() || 0} 💰</div>
                            ${order.status === 'pending' && order.is_buyer ? `
                                <button onclick="window.confirmOrder('${order.order_id}')" class="btn-neon" style="width: 100%; padding: 12px;">✅ Подтвердить получение</button>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderCreateForm() {
            const categories = [
                {id:'car',name:'🚗 Машина'},
                {id:'house',name:'🏠 Дом'},
                {id:'skin',name:'🎨 Скин'},
                {id:'money',name:'💰 Валюта'},
                {id:'accessory',name:'💎 Аксессуар'}
            ];
            
            return `
                <div class="animate-in">
                    <div class="flex-between" style="margin-bottom: 20px;">
                        <button onclick="window.navigate('market')" class="btn-outline" style="padding: 8px 16px;">← Назад</button>
                        <h2 class="text-gradient">Новое объявление</h2>
                        <div style="width: 40px;"></div>
                    </div>
                    
                    <div class="glass-card" style="padding: 20px;">
                        <select id="catSelect">
                            ${categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('')}
                        </select>
                        
                        <input type="text" id="itemName" placeholder="Название товара" style="margin-top: 12px;">
                        <textarea id="itemDesc" rows="3" placeholder="Описание товара"></textarea>
                        <input type="number" id="itemPrice" placeholder="Цена">
                        
                        <div class="flex-between" style="margin: 12px 0;">
                            <span>Возможность торга</span>
                            <input type="checkbox" id="itemHaggle" checked style="width: 24px; height: 24px; margin: 0;">
                        </div>
                        
                        <button onclick="window.submitCreate()" class="btn-neon" style="width: 100%; margin-top: 12px;">📢 Опубликовать</button>
                    </div>
                </div>
            `;
        }
        
        // ========== ГЛОБАЛЬНЫЕ ФУНКЦИИ ==========
        window.navigate = (view) => {
            state.view = view;
            if (view === 'profile') loadProfile();
            if (view === 'orders') loadMyOrders();
            if (view === 'market' && state.currentServer) loadItems();
            render();
        };
        
        window.selectServer = (id) => {
            state.currentServer = SERVERS.find(s => s.id === id);
            state.view = 'market';
            loadItems();
            render();
        };
        
        window.setCategory = (cat) => {
            state.currentCategory = cat;
            loadItems();
        };
        
        window.buyItem = buyItem;
        window.confirmOrder = confirmOrder;
        
        window.submitCreate = () => {
            const category = document.getElementById('catSelect')?.value || 'car';
            const name = document.getElementById('itemName')?.value;
            const desc = document.getElementById('itemDesc')?.value;
            const price = parseInt(document.getElementById('itemPrice')?.value);
            const haggle = document.getElementById('itemHaggle')?.checked || false;
            
            if (!name || !price) {
                showToast('Заполните название и цену', 'error');
                return;
            }
            
            createItem({
                server_id: state.currentServer.id,
                category: category,
                name: name,
                description: desc,
                price: price,
                haggle: haggle
            });
        };
        
        window.loadProfile = loadProfile;
        window.loadMyOrders = loadMyOrders;
        
        // ========== ОТРИСОВКА С ОБРАБОТЧИКАМИ ==========
        function render() {
            const views = {
                servers: renderServers,
                market: renderMarket,
                profile: renderProfile,
                orders: renderOrders,
                create: renderCreateForm
            };
            
            const content = views[state.view] ? views[state.view]() : renderServers();
            document.getElementById('app').innerHTML = content;
            
            if (state.view === 'servers') {
                document.querySelectorAll('.server-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const id = parseInt(card.dataset.id);
                        window.selectServer(id);
                    });
                });
            }
        }
        
        // ========== ЗАПУСК ==========
        loadProfile();
        loadMyOrders();
        render();
    </script>
</body>
</html>
