<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TradeMarket — Рабочая площадка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0a0c;
            --bg-card: #131317;
            --surface: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.08);
            --accent: #FF2D55;
            --accent-glow: rgba(255,45,85,0.3);
            --text: #ffffff;
            --text-secondary: rgba(255,255,255,0.6);
            --radius: 20px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px 100px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeUp 0.3s ease forwards; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        .card:active { transform: scale(0.98); }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 14px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            text-align: center;
        }
        .btn-primary:active { opacity: 0.8; transform: scale(0.97); }

        .btn-secondary {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            text-align: center;
        }

        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10,10,12,0.96);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            padding: 8px 16px 20px;
            z-index: 100;
        }
        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .tab-item.active { color: var(--accent); }
        .tab-ico { font-size: 22px; }
        .tab-lbl { font-size: 10px; font-weight: 600; }

        .server-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .server-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .server-card:active { transform: scale(0.96); }
        .server-name { font-weight: 700; font-size: 16px; margin-bottom: 8px; }
        .server-stats { font-size: 12px; color: var(--text-secondary); display: flex; gap: 12px; }

        .filter-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 16px;
            padding-bottom: 4px;
        }
        .filter-chip {
            white-space: nowrap;
            padding: 8px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
        }
        .filter-chip.active { background: var(--accent); color: white; }

        .item-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .item-card:active { transform: scale(0.98); }

        .form-group { margin-bottom: 16px; }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-size: 15px;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }

        .skeleton {
            background: linear-gradient(90deg, var(--surface) 25%, var(--bg-card) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 16px;
            height: 100px;
            margin-bottom: 12px;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body>
<div id="app" class="container"></div>
<div class="tab-bar" id="tabBar"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();

    // ========== ГЛОБАЛЬНОЕ СОСТОЯНИЕ ==========
    let state = {
        currentTab: 'servers',
        currentServer: null,
        currentCategory: 'all',
        servers: [],
        items: [],
        user: null,
        myOrders: [],
        loading: false,
        searchQuery: ''
    };

    // ========== 90 СЕРВЕРОВ (ТОЛЬКО ID, NAME, COLOR) ==========
    const SERVERS_DATA = [
        {id:1,name:"RED",color:"#FF3B30"},{id:2,name:"GREEN",color:"#34C759"},{id:3,name:"BLUE",color:"#0A84FF"},
        {id:4,name:"YELLOW",color:"#FFCC00"},{id:5,name:"ORANGE",color:"#FF9500"},{id:6,name:"PURPLE",color:"#AF52DE"},
        {id:7,name:"LIME",color:"#ccff00"},{id:8,name:"PINK",color:"#FF2D55"},{id:9,name:"CHERRY",color:"#AC3939"},
        {id:10,name:"BLACK",color:"#8E8E93"},{id:11,name:"INDIGO",color:"#5856D6"},{id:12,name:"WHITE",color:"#FFFFFF"},
        {id:13,name:"MAGENTA",color:"#C406C4"},{id:14,name:"CRIMSON",color:"#D9133B"},{id:15,name:"GOLD",color:"#F1B61F"},
        {id:16,name:"AZURE",color:"#3097FF"},{id:17,name:"PLATINUM",color:"#868480"},{id:18,name:"AQUA",color:"#0DEDED"},
        {id:19,name:"GRAY",color:"#C7C2C1"},{id:20,name:"ICE",color:"#B6F1FE"},{id:21,name:"CHILLI",color:"#FE2726"},
        {id:22,name:"CHOCO",color:"#BF835C"},{id:23,name:"MOSCOW",color:"#FF2B3B"},{id:24,name:"SPB",color:"#11A6FA"},
        {id:25,name:"UFA",color:"#FFBA08"},{id:26,name:"SOCHI",color:"#01AFD6"},{id:27,name:"KAZAN",color:"#007DB2"},
        {id:28,name:"SAMARA",color:"#82339D"},{id:29,name:"ROSTOV",color:"#FBB040"},{id:30,name:"ANAPA",color:"#24ACF8"},
        {id:31,name:"EKB",color:"#93F0A4"},{id:32,name:"KRASNODAR",color:"#A03429"},{id:33,name:"ARZAMAS",color:"#FFF72D"},
        {id:34,name:"NOVOSIB",color:"#99D53B"},{id:35,name:"GROZNY",color:"#009622"},{id:36,name:"SARATOV",color:"#0597EB"},
        {id:37,name:"OMSK",color:"#58E1A5"},{id:38,name:"IRKUTSK",color:"#06E1FF"},{id:39,name:"VOLGOGRAD",color:"#FE0000"},
        {id:40,name:"VORONEZH",color:"#FFF200"},{id:41,name:"BELGOROD",color:"#0039A6"},{id:42,name:"MAKHACHKALA",color:"#42AD42"},
        {id:43,name:"VLADIKAVKAZ",color:"#8EB0D9"},{id:44,name:"VLADIVOSTOK",color:"#3A95FF"},{id:45,name:"KALININGRAD",color:"#F0EBC9"},
        {id:46,name:"CHELYABINSK",color:"#FF6B00"},{id:47,name:"KRASNOYARSK",color:"#D99D1C"},{id:48,name:"CHEBOKSARY",color:"#6CBB74"},
        {id:49,name:"KHABAROVSK",color:"#0184C4"},{id:50,name:"PERM",color:"#FFD700"},{id:51,name:"TULA",color:"#F2B647"},
        {id:52,name:"RYAZAN",color:"#C659EB"},{id:53,name:"MURMANSK",color:"#396797"},{id:54,name:"PENZA",color:"#53E295"},
        {id:55,name:"KURSK",color:"#9E1C00"},{id:56,name:"ARKHANGELSK",color:"#FF007A"},{id:57,name:"ORENBURG",color:"#E39012"},
        {id:58,name:"KIROV",color:"#939393"},{id:59,name:"KEMEROVO",color:"#F61A1B"},{id:60,name:"TYUMEN",color:"#44C9F3"},
        {id:61,name:"TOLYATTI",color:"#8F00FF"},{id:62,name:"IVANOVO",color:"#D5AF80"},{id:63,name:"STAVROPOL",color:"#3F6BE9"},
        {id:64,name:"SMOLENSK",color:"#EE703E"},{id:65,name:"PSKOV",color:"#63A62E"},{id:66,name:"BRYANSK",color:"#26EEBE"},
        {id:67,name:"OREL",color:"#FFEA03"},{id:68,name:"YAROSLAVL",color:"#D01D0D"},{id:69,name:"BARNAUL",color:"#797CC7"},
        {id:70,name:"LIPETSK",color:"#CCD0DA"},{id:71,name:"ULYANOVSK",color:"#B55624"},{id:72,name:"YAKUTSK",color:"#44BFFC"},
        {id:73,name:"TAMBOV",color:"#959595"},{id:74,name:"BRATSK",color:"#e0c1a0"},{id:75,name:"ASTRAKHAN",color:"#F7243A"},
        {id:76,name:"CHITA",color:"#35CA68"},{id:77,name:"KOSTROMA",color:"#F1B10D"},{id:78,name:"VLADIMIR",color:"#F58041"},
        {id:79,name:"KALUGA",color:"#3032A4"},{id:80,name:"NOVGOROD",color:"#FFC700"},{id:81,name:"TAGANROG",color:"#984FCF"},
        {id:82,name:"VOLOGDA",color:"#F54141"},{id:83,name:"TVER",color:"#84B6FF"},{id:84,name:"TOMSK",color:"#00e9b2"},
        {id:85,name:"IZHEVSK",color:"#00A2A4"},{id:86,name:"SURGUT",color:"#4F27DE"},{id:87,name:"PODOLSK",color:"#B7A67E"},
        {id:88,name:"MAGADAN",color:"#B1C1C7"},{id:89,name:"CHEREPOVETS",color:"#3885E9"},{id:90,name:"NORILSK",color:"#AED4F6"}
    ];

    // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С БОТОМ ==========
    function callBot(action, data = {}) {
        return new Promise((resolve) => {
            const id = Date.now() + '_' + Math.random();
            window[id] = resolve;
            tg.sendData(JSON.stringify({ action, ...data, _id: id }));
            setTimeout(() => {
                if (window[id]) { delete window[id]; resolve(null); }
            }, 10000);
        });
    }

    function showToast(msg, type = 'info') {
        tg.showPopup({
            title: type === 'success' ? '✅ Успех' : type === 'error' ? '❌ Ошибка' : 'ℹ️ Информация',
            message: msg,
            buttons: [{type: 'ok'}]
        });
    }

    // ========== ЗАГРУЗКА ДАННЫХ ==========
    async function loadServers() {
        const res = await callBot('get_servers');
        if (res) state.servers = res;
        else state.servers = SERVERS_DATA;
        render();
    }

    async function loadProfile() {
        const res = await callBot('get_profile');
        if (res) state.user = res;
        render();
    }

    async function loadItems() {
        if (!state.currentServer) return;
        state.loading = true;
        render();
        const res = await callBot('get_items', {
            server_id: state.currentServer.id,
            category: state.currentCategory === 'all' ? null : state.currentCategory
        });
        if (res) state.items = res;
        state.loading = false;
        render();
    }

    async function loadMyOrders() {
        const res = await callBot('my_orders');
        if (res) state.myOrders = res;
        render();
    }

    async function createItem(data) {
        const res = await callBot('create_item', data);
        if (res && res.success) {
            showToast('Объявление опубликовано!', 'success');
            await loadItems();
            state.currentTab = 'market';
            render();
        } else {
            showToast('Ошибка: ' + (res?.error || 'Неизвестная ошибка'), 'error');
        }
    }

    async function buyItem(itemId) {
        const res = await callBot('buy_item', { item_id: itemId });
        if (res && res.success) {
            showToast('Сделка создана!', 'success');
            await loadMyOrders();
            render();
        } else {
            showToast('Ошибка: ' + (res?.error || 'Не удалось'), 'error');
        }
    }

    async function confirmOrder(orderId) {
        const res = await callBot('confirm_order', { order_id: orderId });
        if (res && res.success) {
            showToast('Сделка завершена!', 'success');
            await loadMyOrders();
            await loadProfile();
            render();
        } else {
            showToast('Ошибка подтверждения', 'error');
        }
    }

    // ========== РЕНДЕР ==========
    function renderServers() {
        return `
            <div class="animate-in">
                <h1 style="font-size: 28px; font-weight: 800; margin-bottom: 20px;">🎮 Выбор сервера</h1>
                <div class="server-grid">
                    ${state.servers.map(s => `
                        <div class="server-card" data-id="${s.id}" style="border-left: 3px solid ${s.color}">
                            <div class="server-name">${s.name}</div>
                            <div class="server-stats">
                                <span>👥 ${Math.floor(Math.random() * 500) + 100}</span>
                                <span>📦 ${Math.floor(Math.random() * 50) + 5}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    function renderMarket() {
        const categories = [
            {id:'all',name:'Все',icon:'🌐'},{id:'car',name:'Машины',icon:'🚗'},{id:'realty',name:'Дома',icon:'🏠'},
            {id:'skin',name:'Скины',icon:'🎨'},{id:'money',name:'Валюта',icon:'💰'},{id:'service',name:'Услуги',icon:'⚙️'}
        ];

        return `
            <div class="animate-in">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <button class="btn-secondary" style="padding: 8px 16px;" onclick="switchTab('servers')">← Назад</button>
                    <h2 style="font-size: 20px; font-weight: 700; color: ${state.currentServer?.color}">${state.currentServer?.name}</h2>
                    <button class="btn-primary" style="padding: 8px 16px;" onclick="switchTab('create')">+ Продать</button>
                </div>

                <div class="filter-bar">
                    ${categories.map(c => `
                        <div class="filter-chip ${state.currentCategory === c.id ? 'active' : ''}" onclick="setCategory('${c.id}')">
                            ${c.icon} ${c.name}
                        </div>
                    `).join('')}
                </div>

                ${state.loading ? `
                    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
                ` : state.items.length === 0 ? `
                    <div class="card" style="text-align: center; padding: 40px;">
                        <div style="font-size: 48px; margin-bottom: 12px;">📭</div>
                        <p>Нет объявлений на этом сервере</p>
                        <button class="btn-primary" style="margin-top: 16px;" onclick="switchTab('create')">Создать первое</button>
                    </div>
                ` : state.items.map(item => `
                    <div class="item-card" onclick="openItem('${item.item_id}')">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <span style="font-weight: 600;">${item.name}</span>
                            <span style="font-size: 12px; color: var(--text-secondary);">⭐ ${item.seller_rating || 0}</span>
                        </div>
                        <div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">${item.description?.substring(0, 60) || 'Без описания'}</div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 20px; font-weight: 700; color: var(--accent);">${(item.price || 0).toLocaleString()} ₽</span>
                            <button class="btn-primary" style="padding: 8px 16px; width: auto;" onclick="event.stopPropagation(); buyItem('${item.item_id}')">Купить</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderProfile() {
        const u = state.user || { first_name: 'Загрузка...', rating: 0, deals: 0, seller_deals: 0, buyer_deals: 0 };
        return `
            <div class="animate-in">
                <div class="card" style="text-align: center; padding: 24px;">
                    <div style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--accent), #FF6B35); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 16px;">
                        ${u.first_name?.charAt(0) || '👤'}
                    </div>
                    <h2 style="font-size: 22px; font-weight: 700;">${u.first_name}</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 16px;">@${u.username || 'user'}</p>
                    <div style="display: flex; justify-content: space-around; margin-bottom: 20px;">
                        <div><div style="font-size: 28px; font-weight: 700;">${u.rating || 0}</div><div style="font-size: 11px;">⭐ Рейтинг</div></div>
                        <div><div style="font-size: 28px; font-weight: 700;">${u.deals || 0}</div><div style="font-size: 11px;">📦 Сделок</div></div>
                        <div><div style="font-size: 28px; font-weight: 700;">${u.seller_deals || 0}</div><div style="font-size: 11px;">🛒 Продаж</div></div>
                    </div>
                    <button class="btn-secondary" onclick="switchTab('orders')">📋 Мои сделки (${state.myOrders.length})</button>
                </div>
                <button class="btn-primary" style="margin-top: 16px;" onclick="switchTab('create')">➕ Продать товар</button>
            </div>
        `;
    }

    function renderOrders() {
        if (state.myOrders.length === 0) {
            return `
                <div class="animate-in">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
                        <button class="btn-secondary" style="padding: 8px 16px;" onclick="switchTab('profile')">← Назад</button>
                        <h2 style="font-size: 20px;">Мои сделки</h2>
                    </div>
                    <div class="card" style="text-align: center; padding: 40px;">
                        <div style="font-size: 48px;">📭</div>
                        <p>Нет сделок</p>
                    </div>
                </div>
            `;
        }

        return `
            <div class="animate-in">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
                    <button class="btn-secondary" style="padding: 8px 16px;" onclick="switchTab('profile')">← Назад</button>
                    <h2 style="font-size: 20px;">Мои сделки</h2>
                    <button class="btn-secondary" style="padding: 8px 12px; margin-left: auto;" onclick="loadMyOrders()">🔄</button>
                </div>
                ${state.myOrders.map(order => `
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span style="font-weight: 600;">${order.item_name}</span>
                            <span class="badge" style="color: ${order.status === 'pending' ? '#FF9500' : '#30D158'}">${order.status === 'pending' ? '⏳ Ожидает' : '✅ Завершено'}</span>
                        </div>
                        <div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;">
                            ${order.is_buyer ? 'Вы покупаете у' : 'Вы продаёте'} @${order.other_user}
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 20px; font-weight: 700;">${(order.price || 0).toLocaleString()} ₽</span>
                            ${order.status === 'pending' && order.is_buyer ? `
                                <button class="btn-primary" style="padding: 8px 16px; width: auto;" onclick="confirmOrder('${order.order_id}')">✅ Подтвердить</button>
                            ` : ''}
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function renderCreateForm() {
        return `
            <div class="animate-in">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
                    <button class="btn-secondary" style="padding: 8px 16px;" onclick="switchTab('market')">← Назад</button>
                    <h2 style="font-size: 20px;">Новое объявление</h2>
                </div>
                <div class="card">
                    <div class="form-group">
                        <label class="form-label">Категория</label>
                        <select id="catSelect">
                            <option value="car">🚗 Машина</option>
                            <option value="realty">🏠 Дом</option>
                            <option value="skin">🎨 Скин</option>
                            <option value="money">💰 Валюта</option>
                            <option value="service">⚙️ Услуга</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Название товара</label>
                        <input type="text" id="itemName" placeholder="Например: BMW M5 Competition">
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <textarea id="itemDesc" rows="3" placeholder="Подробное описание..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Цена (₽)</label>
                        <input type="number" id="itemPrice" placeholder="Сумма">
                    </div>
                    <div class="form-group">
                        <label>Марка</label>
                        <input type="text" id="itemBrand" placeholder="BMW, Mercedes и т.д.">
                    </div>
                    <div class="form-group">
                        <label>Модель</label>
                        <input type="text" id="itemModel" placeholder="M5, GT63...">
                    </div>
                    <div class="form-group">
                        <label>Пробег (км)</label>
                        <input type="number" id="itemMileage" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>Цвет</label>
                        <input type="text" id="itemColor" placeholder="Черный, Белый...">
                    </div>
                    <div class="form-group">
                        <label>Тюнинг</label>
                        <input type="text" id="itemTuning" placeholder="Stage 2, Renntech...">
                    </div>
                    <div class="form-group">
                        <label>Ссылки на фото (через запятую)</label>
                        <input type="text" id="itemImages" placeholder="https://... , https://...">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="itemBargain" checked> Возможность торга
                        </label>
                    </div>
                    <button class="btn-primary" onclick="submitCreate()">📢 Опубликовать</button>
                </div>
            </div>
        `;
    }

    // ========== ГЛОБАЛЬНЫЕ ФУНКЦИИ ==========
    window.switchTab = (tab) => {
        state.currentTab = tab;
        if (tab === 'servers') loadServers();
        if (tab === 'market' && state.currentServer) loadItems();
        if (tab === 'profile') { loadProfile(); loadMyOrders(); }
        if (tab === 'orders') loadMyOrders();
        render();
        updateTabBar();
    };

    window.selectServer = (id) => {
        state.currentServer = state.servers.find(s => s.id === id);
        state.currentTab = 'market';
        loadItems();
        render();
        updateTabBar();
    };

    window.setCategory = (cat) => {
        state.currentCategory = cat;
        loadItems();
    };

    window.openItem = (itemId) => {
        tg.showAlert('Просмотр объявления в разработке');
    };

    window.submitCreate = () => {
        const name = document.getElementById('itemName')?.value;
        const price = parseInt(document.getElementById('itemPrice')?.value);
        if (!name || !price) {
            showToast('Заполните название и цену', 'error');
            return;
        }
        createItem({
            server_id: state.currentServer.id,
            server_name: state.currentServer.name,
            server_color: state.currentServer.color,
            category: document.getElementById('catSelect')?.value,
            name: name,
            description: document.getElementById('itemDesc')?.value || '',
            price: price,
            brand: document.getElementById('itemBrand')?.value || '',
            model: document.getElementById('itemModel')?.value || '',
            mileage: parseInt(document.getElementById('itemMileage')?.value) || 0,
            color: document.getElementById('itemColor')?.value || '',
            tuning: document.getElementById('itemTuning')?.value || '',
            images: document.getElementById('itemImages')?.value?.split(',').map(s => s.trim()) || [],
            bargain: document.getElementById('itemBargain')?.checked || false
        });
    };

    window.buyItem = buyItem;
    window.confirmOrder = confirmOrder;
    window.loadMyOrders = loadMyOrders;

    function updateTabBar() {
        const tabs = ['servers', 'market', 'profile'];
        const icons = { servers: '🌐', market: '🛒', profile: '👤' };
        const labels = { servers: 'Серверы', market: 'Маркет', profile: 'Профиль' };
        document.getElementById('tabBar').innerHTML = tabs.map(tab => `
            <div class="tab-item ${state.currentTab === tab ? 'active' : ''}" onclick="switchTab('${tab}')">
                <div class="tab-ico">${icons[tab]}</div>
                <div class="tab-lbl">${labels[tab]}</div>
            </div>
        `).join('');
    }

    function render() {
        const views = {
            servers: renderServers,
            market: renderMarket,
            profile: renderProfile,
            orders: renderOrders,
            create: renderCreateForm
        };
        const content = views[state.currentTab] ? views[state.currentTab]() : renderServers();
        document.getElementById('app').innerHTML = content;

        if (state.currentTab === 'servers') {
            document.querySelectorAll('.server-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.dataset.id);
                    selectServer(id);
                });
            });
        }
    }

    // ========== ЗАПУСК ==========
    loadServers();
    loadProfile();
    loadMyOrders();
    render();
    updateTabBar();
</script>
</body>
</html>
