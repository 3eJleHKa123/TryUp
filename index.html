<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TradeMarket — Dark Premium Plates iOS 26</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Динамический цвет (меняется при выборе сервера) */
            --active-color: #0A84FF; 
            
            --bg-deep: #050507;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.45);
            
            /* Рельефное стекло + динамическое переливание */
            --glass-base: rgba(18, 18, 22, 0.5);
            --glass-blur: blur(40px) saturate(200%);
            
            --relief-shadow: 
                15px 15px 35px rgba(0, 0, 0, 0.8), 
                -5px -5px 15px rgba(255, 255, 255, 0.02),
                inset 1px 1px 2px rgba(255, 255, 255, 0.1),
                inset -1px -1px 4px rgba(0, 0, 0, 0.7);
                
            --relief-shadow-active: 
                inset 4px 4px 10px rgba(0, 0, 0, 0.9),
                inset -2px -2px 5px rgba(255, 255, 255, 0.05);

            --radius-lg: 24px;
            --radius-md: 16px;
            
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --smooth: cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        body {
            background-color: var(--bg-deep); color: var(--text-main);
            min-height: 100vh; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Фоновые эффекты: Шум + Цветные Ауры */
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999;
            pointer-events: none; opacity: 0.04; mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .dark-aurora {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--active-color) 15%, transparent) 0%, transparent 60%),
                        radial-gradient(circle at 10% 100%, rgba(94, 92, 230, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 90% 100%, color-mix(in srgb, var(--active-color) 10%, transparent) 0%, transparent 50%);
            transition: background 0.8s ease;
        }

        .container {
            max-width: 600px; margin: 0 auto; padding: 24px 16px 140px 16px; min-height: 100vh;
            position: relative; z-index: 1;
            overflow: visible;
        }

        /* БАЗОВЫЙ КЛАСС СТЕКЛА + АНИМАЦИЯ ПЕРЕЛИВАНИЯ РЕЛЬЕФА */
        .glass-relief {
            background: var(--glass-base);
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg);
            box-shadow: var(--relief-shadow);
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative; overflow: hidden;
            transition: box-shadow 0.4s var(--spring);
        }
        .glass-relief::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            opacity: 0.5;
        }
        /* ДИНАМИЧЕСКОЕ ПЕРЕЛИВАНИЕ СТЕКЛА (shine sweep) */
        .glass-relief::after {
            content: '';
            position: absolute;
            inset: -50% -150% -50% -150%;
            background: linear-gradient(100deg, transparent, rgba(255,255,255,0.28), transparent);
            transform: skewX(-25deg);
            animation: glassShine 7s linear infinite;
            pointer-events: none;
            z-index: 2;
            opacity: 0.13;
            mix-blend-mode: overlay;
        }

        /* ---------------------------------------------------
           ИСПРАВЛЕНИЕ: ТАБЫ — ТЕНИ БОЛЬШЕ НЕ ОБРЕЗАЮТСЯ
           --------------------------------------------------- */
        .tabs-scroll-wrapper {
            margin: 0 -16px;
            padding: 20px 20px 72px 20px; /* Увеличено для полноценной тени + glow tab-item.active */
            margin-bottom: -52px;
            overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .tabs-scroll-wrapper::-webkit-scrollbar { display: none; }
        
        .segmented-tabs { display: inline-flex; gap: 12px; width: max-content; }
        
        .tab-item {
            padding: 12px 22px; font-size: 15px; font-weight: 700; border-radius: 20px;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-muted); cursor: pointer; white-space: nowrap;
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5); 
            transition: all 0.3s var(--spring);
            position: relative; overflow: hidden;
        }
        .tab-item.active {
            background: var(--active-color); color: #fff; border-color: rgba(255,255,255,0.3);
            box-shadow: 0 12px 30px color-mix(in srgb, var(--active-color) 65%, transparent),
                        inset 1px 1px 3px rgba(255,255,255,0.5);
        }
        /* Лёгкое переливание и на табах */
        .tab-item::after {
            content: '';
            position: absolute;
            inset: -50% -150% -50% -150%;
            background: linear-gradient(100deg, transparent, rgba(255,255,255,0.25), transparent);
            transform: skewX(-25deg);
            animation: glassShine 9s linear infinite;
            pointer-events: none;
            opacity: 0.08;
            z-index: 1;
        }
        .tab-item.active::after { opacity: 0.22; animation-duration: 3s; }

        /* ---------------------------------------------------
           СЕРВЕРЫ: ПРЯМОУГОЛЬНЫЕ ПЛАШКИ + ЗУМ В ЦЕНТРЕ + ПЕРЕЛИВАНИЕ
           --------------------------------------------------- */
        .servers-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 14px; 
        }
        
        .server-plate {
            position: relative;
            background: rgba(20, 20, 25, 0.5);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-bottom: 1px solid color-mix(in srgb, var(--srv-color) 30%, transparent);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 -2px 15px color-mix(in srgb, var(--srv-color) 10%, transparent);
            cursor: pointer; overflow: hidden;
            transition: all 0.3s var(--spring);
            transform: scale(1); /* для зума */
        }
        /* Переливание рельефа на серверах */
        .server-plate::before {
            content: '';
            position: absolute;
            inset: -50% -150% -50% -150%;
            background: linear-gradient(100deg, transparent, rgba(255,255,255,0.28), transparent);
            transform: skewX(-25deg);
            animation: glassShine 6s linear infinite;
            pointer-events: none;
            z-index: 1;
            opacity: 0.16;
        }
        .server-plate::after {
            content: ''; position: absolute; top: 0; right: 0; width: 60px; height: 100%;
            background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--srv-color) 15%, transparent));
            pointer-events: none;
            z-index: 2;
        }

        .server-plate-name {
            font-size: 15px; font-weight: 800; color: #fff;
            letter-spacing: 0.5px; z-index: 3;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        .server-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--srv-color);
            box-shadow: 0 0 12px var(--srv-color), 0 0 24px var(--srv-color), inset 1px 1px 2px rgba(255,255,255,0.8);
            z-index: 3;
            animation: neonPulse 2.8s ease-in-out infinite;
        }

        .server-plate:active {
            transform: scale(0.93);
            box-shadow: var(--relief-shadow-active), 0 0 15px color-mix(in srgb, var(--srv-color) 30%, transparent);
            border-top-color: rgba(255, 255, 255, 0.05);
        }

        /* 3D Кнопки с улучшенным переливанием */
        .btn-3d {
            display: inline-flex; align-items: center; justify-content: center;
            width: 100%; padding: 18px 24px; font-size: 17px; font-weight: 700; letter-spacing: 0.5px;
            border-radius: var(--radius-md); border: none; cursor: pointer; color: #fff;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(0,0,0,0.4));
            box-shadow: 0 10px 25px color-mix(in srgb, var(--active-color) 40%, transparent), inset 1px 1px 2px rgba(255,255,255,0.3), inset -1px -1px 4px rgba(0,0,0,0.5);
            border: 1px solid color-mix(in srgb, var(--active-color) 50%, transparent);
            position: relative; overflow: hidden; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .btn-3d::after {
            content: '';
            position: absolute;
            inset: -50% -150% -50% -150%;
            background: linear-gradient(100deg, transparent, rgba(255,255,255,0.35), transparent);
            transform: skewX(-25deg);
            animation: glassShine 8s linear infinite;
            pointer-events: none;
            opacity: 0.12;
            z-index: 2;
        }
        .btn-3d:active {
            transform: scale(0.94) translateY(2px);
            box-shadow: var(--relief-shadow-active), 0 0 15px color-mix(in srgb, var(--active-color) 60%, transparent);
        }
        .btn-3d:active::after {
            animation-duration: 1.2s;
            opacity: 0.35;
        }

        .btn-icon {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(145deg, rgba(40,40,45,0.8), rgba(15,15,20,0.8));
            box-shadow: var(--relief-shadow); border: 1px solid rgba(255,255,255,0.05);
            color: var(--active-color); cursor: pointer; transition: all 0.3s var(--spring);
        }
        .btn-icon:active { transform: scale(0.85); box-shadow: var(--relief-shadow-active); }

        .fab-container {
            position: fixed; bottom: 30px; left: 16px; right: 16px;
            display: flex; justify-content: center; z-index: 100; pointer-events: none;
        }
        .fab-btn {
            pointer-events: auto; width: 100%; max-width: 400px;
            background: var(--active-color); padding: 18px 32px; border-radius: 30px;
            font-weight: 800; font-size: 16px; color: #fff;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 15px 35px color-mix(in srgb, var(--active-color) 60%, transparent), inset 2px 2px 5px rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.2); animation: float-up 0.8s var(--spring) forwards; transition: all 0.3s var(--spring);
        }
        .fab-btn:active { transform: scale(0.9); box-shadow: 0 5px 15px color-mix(in srgb, var(--active-color) 40%, transparent); }

        /* АНИМАЦИИ */
        @keyframes glassShine {
            0% { transform: translateX(-150%) skewX(-25deg); }
            100% { transform: translateX(300%) skewX(-25deg); }
        }
        @keyframes neonPulse {
            0%, 100% { box-shadow: 0 0 12px var(--srv-color), 0 0 24px var(--srv-color), inset 1px 1px 2px rgba(255,255,255,0.8); }
            50% { box-shadow: 0 0 22px var(--srv-color), 0 0 44px var(--srv-color), inset 1px 1px 2px rgba(255,255,255,0.8); }
        }
        .page-enter { animation: zoom-fade-in 0.6s var(--spring) forwards; transform-origin: top center; }
        @keyframes zoom-fade-in { 0% { opacity: 0; transform: scale(0.92) translateY(30px); filter: blur(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); } }
        .stagger-item { opacity: 0; animation: slide-in-right 0.5s var(--spring) forwards; }
        @keyframes slide-in-right { 0% { opacity: 0; transform: translateX(30px) scale(0.95); } 100% { opacity: 1; transform: translateX(0) scale(1); } }
        @keyframes float-up { 0% { opacity: 0; transform: translateY(50px) scale(0.8); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

        /* ОСТАЛЬНЫЕ ЭЛЕМЕНТЫ */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; position: relative; }
        .header-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.5) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 4px 20px color-mix(in srgb, var(--active-color) 30%, transparent); }

        .market-card { padding: 20px; margin-bottom: 20px; cursor: pointer; }
        .market-card:active { transform: scale(0.96); }
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .card-badge { background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--active-color); border: 1px solid color-mix(in srgb, var(--active-color) 30%, transparent); box-shadow: 0 0 10px color-mix(in srgb, var(--active-color) 20%, transparent); }
        .card-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
        .card-desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 16px; }
        .card-price { font-size: 26px; font-weight: 900; background: linear-gradient(135deg, #fff, var(--text-muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .buy-mini-btn { background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 14px; border: 1px solid color-mix(in srgb, var(--active-color) 50%, transparent); color: var(--active-color); font-weight: 700; }

        .input-group { margin-bottom: 20px; position: relative; }
        .glass-input { width: 100%; padding: 20px; font-size: 16px; color: #fff; background: rgba(0,0,0,0.3); border-radius: var(--radius-md); border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 2px 2px 8px rgba(0,0,0,0.6), inset -1px -1px 2px rgba(255,255,255,0.05); outline: none; transition: 0.3s; -webkit-appearance: none; }
        .glass-input:focus { border-color: var(--active-color); background: rgba(0,0,0,0.5); box-shadow: inset 2px 2px 8px rgba(0,0,0,0.8), 0 0 15px color-mix(in srgb, var(--active-color) 30%, transparent); }

        .toggle-ios { appearance: none; -webkit-appearance: none; width: 56px; height: 32px; background: rgba(0,0,0,0.4); border-radius: 30px; position: relative; cursor: pointer; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.6); outline: none; transition: 0.4s var(--spring); border: 1px solid rgba(255,255,255,0.05); }
        .toggle-ios::after { content: ''; position: absolute; top: 2px; left: 2px; width: 26px; height: 26px; background: #fff; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.5), inset -1px -1px 2px rgba(0,0,0,0.2); transition: 0.4s var(--spring); }
        .toggle-ios:checked { background: var(--active-color); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4), 0 0 15px color-mix(in srgb, var(--active-color) 50%, transparent); }
        .toggle-ios:checked::after { transform: translateX(24px); }

        .hologram-avatar { width: 130px; height: 130px; margin: 0 auto 24px; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; font-size: 50px; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(0,0,0,0.6)); box-shadow: var(--relief-shadow), 0 0 30px color-mix(in srgb, var(--active-color) 30%, transparent); border: 2px solid rgba(255,255,255,0.1); }
        .hologram-avatar::before { content: ''; position: absolute; inset: -5px; border-radius: 50%; background: conic-gradient(from 0deg, transparent, var(--active-color), transparent 50%); animation: spin 4s linear infinite; z-index: -1; filter: blur(10px); opacity: 0.5; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .svg-icon { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>

        let state = { view: 'servers', currentServer: null, user: null, items: [], myOrders: [], loading: false, currentCategory: 'all' };
        
        function callBot(action, data = {}) { return new Promise((resolve) => { const id = Date.now() + '_' + Math.random(); window[id] = resolve; tg.sendData(JSON.stringify({ action, ...data, _id: id })); setTimeout(() => { if (window[id]) { delete window[id]; resolve(null); } }, 10000); }); }
        function showToast(msg, type = 'info') { tg.showPopup({ title: type === 'success' ? 'Успех' : type === 'error' ? 'Ошибка' : 'Инфо', message: msg, buttons: [{type: 'ok'}] }); }
        
        async function loadProfile() { if (!state.user) { const res = await callBot('get_profile'); if (res) state.user = res; } }
        async function loadItems() { if (!state.currentServer) return; state.loading = true; render(); const res = await callBot('get_items', { server_id: state.currentServer.id, category: state.currentCategory === 'all' ? null : state.currentCategory }); if (res) state.items = res; state.loading = false; render(); }
        async function loadMyOrders() { const res = await callBot('my_orders'); if (res) state.myOrders = res; }
        
        async function createItem(data) { const res = await callBot('create_item', data); if (res?.success) { showToast('Готово!', 'success'); await loadItems(); state.view = 'market'; render(); } else { showToast('Ошибка: ' + (res?.error || 'Сбой'), 'error'); } }
        async function buyItem(itemId) { tg.showConfirm(`Подтверждаете покупку?`, async (confirmed) => { if (confirmed) { const res = await callBot('buy_item', { item_id: itemId }); if (res?.success) { showToast('Сделка открыта!', 'success'); await loadMyOrders(); render(); } else { showToast('Ошибка: ' + (res?.error || 'Отмена'), 'error'); } } }); }
        async function confirmOrder(orderId) { tg.showConfirm(`Завершить сделку?`, async (confirmed) => { if (confirmed) { const res = await callBot('confirm_order', { order_id: orderId }); if (res?.success) { showToast('Успешно!', 'success'); await loadMyOrders(); await loadProfile(); render(); } else { showToast('Сбой', 'error'); } } }); }
        
        function getRank(deals) { if (deals >= 50) return { name: 'VIP Legend', clr: '#FF2D55' }; if (deals >= 20) return { name: 'Master', clr: '#BF5AF2' }; if (deals >= 5) return { name: 'Trader', clr: '#0A84FF' }; return { name: 'Novice', clr: '#34C759' }; }

        const iBack = `<svg class="svg-icon"><path d="M15 18l-6-6 6-6"/></svg>`;
        const iAdd = `<svg class="svg-icon"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`;
        const iProf = `<svg class="svg-icon"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`;

        /* ====================== ЭФФЕКТ ЗУМА СЕРВЕРОВ В ЦЕНТРЕ ====================== */
        let zoomScrollHandler = null;

        function updateServerZooms() {
            if (state.view !== 'servers') return;
            const plates = document.querySelectorAll('.server-plate');
            if (!plates.length) return;

            const viewportCenterY = window.innerHeight / 2;
            const maxZoomDist = window.innerHeight * 0.48;

            plates.forEach(plate => {
                const rect = plate.getBoundingClientRect();
                const plateCenterY = rect.top + rect.height / 2;
                const distance = Math.abs(plateCenterY - viewportCenterY);
                const zoomFactor = Math.max(0, 1 - (distance / maxZoomDist));
                const scale = 1 + (0.16 * Math.pow(zoomFactor, 1.15)); // плавный, не резкий зум

                plate.style.transition = 'transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1)';
                plate.style.transform = `scale(${scale.toFixed(3)})`;
                plate.style.zIndex = Math.round(zoomFactor * 20); // центральные чуть выше
            });
        }

        const createZoomHandler = () => {
            let rafPending = false;
            return () => {
                if (rafPending) return;
                rafPending = true;
                requestAnimationFrame(() => {
                    updateServerZooms();
                    rafPending = false;
                });
            };
        };

        function renderServers() {
            return `
                <div class="page-enter">
                    <div class="header">
                        <div class="header-title">Выбор сервера</div>
                        <div class="btn-icon" onclick="window.navigate('profile')">${iProf}</div>
                    </div>
                    
                    <div class="servers-grid">
                        ${SERVERS.map((s, i) => `
                            <div class="server-plate stagger-item" style="--srv-color: ${s.color}; animation-delay: ${i * 0.013}s" 
                                 onclick="window.selectServer(${s.id}, '${s.color}')">
                                <span class="server-plate-name">${s.name}</span>
                                <div class="server-dot"></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        function renderMarket() {
            const cats = [ {id:'all', n:'Всё'}, {id:'car', n:'Авто'}, {id:'house', n:'Дома'}, {id:'skin', n:'Скины'}, {id:'money', n:'Валюта'}, {id:'accessory', n:'Вещи'} ];
            
            return `
                <div class="page-enter">
                    <div class="header">
                        <div class="btn-icon" onclick="window.navigate('servers')">${iBack}</div>
                        <div class="header-title" style="color: var(--active-color); text-shadow: 0 0 20px color-mix(in srgb, var(--active-color) 50%, transparent);">${state.currentServer?.name}</div>
                        <div class="btn-icon" onclick="window.navigate('profile')">${iProf}</div>
                    </div>
                    
                    <div class="tabs-scroll-wrapper stagger-item">
                        <div class="segmented-tabs">
                            ${cats.map(cat => `
                                <div class="tab-item ${state.currentCategory === cat.id ? 'active' : ''}" 
                                     onclick="window.setCategory('${cat.id}')">${cat.n}</div>
                            `).join('')}
                        </div>
                    </div>
                    
                    ${state.loading ? `<div class="glass-relief" style="padding:40px; text-align:center;">Поиск данных...</div>` :
                    state.items.length === 0 ? `
                        <div class="glass-relief stagger-item" style="padding: 60px 20px; text-align:center; animation-delay: 0.1s;">
                            <div style="font-size: 50px; opacity: 0.2; margin-bottom: 20px;">🕸</div>
                            <h3 style="margin-bottom: 10px;">Рынок пуст</h3>
                            <p style="color: var(--text-muted); font-size: 15px;">Станьте первым продавцом</p>
                        </div>
                    ` : state.items.map((item, i) => `
                        <div class="glass-relief market-card stagger-item" style="animation-delay: ${(i % 10) * 0.05}s" onclick="window.buyItem('${item.item_id}')">
                            <div class="card-top">
                                <span class="card-badge">Рейтинг ${item.seller_rating || 0}</span>
                            </div>
                            <div class="card-title">${item.name}</div>
                            <div class="card-desc">${item.description || 'Описание отсутствует'}</div>
                            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 20px;">
                                <div class="card-price">${(item.price || 0).toLocaleString()} ₽</div>
                                <div class="buy-mini-btn">Купить</div>
                            </div>
                        </div>
                    `).join('')}

                    <div class="fab-container">
                        <div class="fab-btn" onclick="window.navigate('create')">
                            ${iAdd} Разместить объявление
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderProfile() {
            const u = state.user || { first_name: 'Загрузка...', rating: 0, deals: 0 };
            const rank = getRank(u.deals || 0);
            
            return `
                <div class="page-enter">
                    <div class="header">
                        <div class="btn-icon" onclick="window.navigate('servers')">${iBack}</div>
                        <div class="header-title">Профиль</div>
                        <div style="width:48px;"></div>
                    </div>
                    
                    <div class="stagger-item">
                        <div class="hologram-avatar">${u.first_name?.charAt(0) || '👤'}</div>
                        <div style="text-align: center; margin-bottom: 40px;">
                            <h2 style="font-size: 32px; font-weight: 800; margin-bottom: 8px;">${u.first_name}</h2>
                            <div style="display:inline-block; padding: 6px 16px; border-radius: 20px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: ${rank.clr}; font-weight: 800; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8);">${rank.name}</div>
                        </div>
                    </div>
                    
                    <div style="display:flex; gap: 16px; margin-bottom: 24px;" class="stagger-item" style="animation-delay: 0.1s;">
                        <div class="glass-relief" style="flex:1; padding: 24px; text-align:center;">
                            <div style="font-size: 36px; font-weight: 900; margin-bottom: 8px; text-shadow: 0 0 20px rgba(255,255,255,0.3);">${u.rating || 0}</div>
                            <div style="color: var(--text-muted); font-size: 13px; font-weight: 700; text-transform: uppercase;">Рейтинг</div>
                        </div>
                        <div class="glass-relief" style="flex:1; padding: 24px; text-align:center;">
                            <div style="font-size: 36px; font-weight: 900; margin-bottom: 8px; text-shadow: 0 0 20px rgba(255,255,255,0.3);">${u.deals || 0}</div>
                            <div style="color: var(--text-muted); font-size: 13px; font-weight: 700; text-transform: uppercase;">Сделок</div>
                        </div>
                    </div>
                    
                    <div class="glass-relief stagger-item" style="padding: 8px; margin-bottom: 16px; animation-delay: 0.2s;">
                        <button class="btn-3d" style="background: transparent; box-shadow: none; border: none; justify-content: space-between;" onclick="window.navigate('orders')">
                            <span>Моя история сделок</span>
                            <span style="background: var(--active-color); padding: 4px 12px; border-radius: 12px; font-size: 14px; box-shadow: 0 0 10px var(--active-color);">${state.myOrders.length}</span>
                        </button>
                    </div>
                </div>
            `;
        }
        
        function renderOrders() {
            return `
                <div class="page-enter">
                    <div class="header">
                        <div class="btn-icon" onclick="window.navigate('profile')">${iBack}</div>
                        <div class="header-title">Сделки</div>
                        <div style="width:48px;"></div>
                    </div>
                    
                    ${state.myOrders.length === 0 ? `
                        <div class="glass-relief stagger-item" style="padding: 40px; text-align:center;">Пусто</div>
                    ` : state.myOrders.map((order, i) => `
                        <div class="glass-relief market-card stagger-item" style="animation-delay: ${i * 0.1}s; cursor: default;">
                            <div class="card-top">
                                <span class="card-badge" style="color: ${order.status === 'completed' ? '#34C759' : '#FF9500'}; border-color: ${order.status === 'completed' ? '#34C759' : '#FF9500'};">
                                    ${order.status === 'pending' ? 'Ожидание' : 'Выполнено'}
                                </span>
                            </div>
                            <div class="card-title">${order.item_name}</div>
                            <div class="card-desc">Контрагент: @${order.other_user}</div>
                            <div class="card-price" style="margin-bottom: 20px;">${(order.price || 0).toLocaleString()} ₽</div>
                            ${order.status === 'pending' && order.is_buyer ? `
                                <button class="btn-3d" onclick="window.confirmOrder('${order.order_id}')">Подтвердить получение</button>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderCreateForm() {
            return `
                <div class="page-enter">
                    <div class="header">
                        <div class="btn-icon" onclick="window.navigate('market')">${iBack}</div>
                        <div class="header-title">Продажа</div>
                        <div style="width:48px;"></div>
                    </div>
                    
                    <div class="glass-relief stagger-item" style="padding: 24px;">
                        <div class="input-group">
                            <select id="catSelect" class="glass-input">
                                <option value="car">Машина</option><option value="house">Дом</option><option value="skin">Скин</option>
                                <option value="money">Валюта</option><option value="accessory">Аксессуар</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <input type="text" id="itemName" class="glass-input" placeholder="Название товара (например, BMW M5)">
                        </div>
                        <div class="input-group">
                            <textarea id="itemDesc" class="glass-input" rows="3" placeholder="Описание характеристик..."></textarea>
                        </div>
                        <div class="input-group">
                            <input type="number" id="itemPrice" class="glass-input" placeholder="Стоимость (₽)">
                        </div>
                        
                        <div class="glass-relief" style="display:flex; justify-content:space-between; align-items:center; padding: 20px; margin-bottom: 24px;">
                            <span style="font-weight: 700; font-size: 16px;">Доступен торг</span>
                            <input type="checkbox" id="itemHaggle" class="toggle-ios" checked>
                        </div>
                        
                        <button class="btn-3d" onclick="window.submitCreate()">Опубликовать лот</button>
                    </div>
                </div>
            `;
        }
        
        window.navigate = async (view) => { 
            state.view = view; 
            if (view === 'profile') { await loadProfile(); await loadMyOrders(); } 
            if (view === 'orders') await loadMyOrders(); 
            if (view === 'market' && state.currentServer) await loadItems(); 
            render(); 
        };
        window.selectServer = (id, color) => { state.currentServer = SERVERS.find(s => s.id === id); document.documentElement.style.setProperty('--active-color', color); navigate('market'); };
        window.setCategory = (cat) => { state.currentCategory = cat; loadItems(); };
        window.buyItem = buyItem; window.confirmOrder = confirmOrder;
        window.submitCreate = () => { 
            const data = { 
                server_id: state.currentServer.id, 
                category: document.getElementById('catSelect')?.value, 
                name: document.getElementById('itemName')?.value, 
                description: document.getElementById('itemDesc')?.value, 
                price: parseInt(document.getElementById('itemPrice')?.value), 
                haggle: document.getElementById('itemHaggle')?.checked || false 
            }; 
            if (!data.name || !data.price) { showToast('Заполните название и цену', 'error'); return; } 
            createItem(data); 
        };
        
        function render() { 
            const views = { servers: renderServers, market: renderMarket, profile: renderProfile, orders: renderOrders, create: renderCreateForm }; 
            document.getElementById('app').innerHTML = (views[state.view] || renderServers)(); 
            
            /* Пост-рендер эффекты */
            if (state.view === 'servers') {
                setTimeout(() => {
                    if (zoomScrollHandler) window.removeEventListener('scroll', zoomScrollHandler, { passive: true });
                    zoomScrollHandler = createZoomHandler();
                    window.addEventListener('scroll', zoomScrollHandler, { passive: true });
                    updateServerZooms();
                }, 120);
            } else if (zoomScrollHandler) {
                window.removeEventListener('scroll', zoomScrollHandler, { passive: true });
                zoomScrollHandler = null;
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }
        
        loadProfile().then(render);
    </script>
</body>
</html>
