<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TradeMarket — Liquid Glass</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --background-color: #000000;
            --primary-text-color: #ffffff;
            --secondary-text-color: #8d8d92;
            --card-background-color: rgba(28, 28, 30, 0.7);
            --card-border-color: rgba(60, 60, 67, 0.36);
            --blur-intensity: 30px;
            --primary-accent-color: #0A84FF;
            --secondary-accent-color: #5E5CE6;
            --border-radius-large: 20px;
            --border-radius-medium: 16px;
            --border-radius-small: 12px;
            --transition-duration: 0.4s;
            --cubic-bezier: cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'San Francisco', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            background-color: var(--background-color);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--primary-text-color);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .background-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .background-glow::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            top: -20%;
            left: -20%;
            background: radial-gradient(circle, rgba(10, 132, 255, 0.15) 0%, transparent 60%);
            animation: moveGlow 15s ease-in-out infinite;
        }

        .background-glow::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            bottom: -20%;
            right: -20%;
            background: radial-gradient(circle, rgba(94, 92, 230, 0.15) 0%, transparent 60%);
            animation: moveGlow 15s ease-in-out infinite reverse;
        }

        @keyframes moveGlow {
            0% { transform: translate(0, 0); }
            50% { transform: translate(40px, 60px) scale(1.2); }
            100% { transform: translate(0, 0); }
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 100px;
        }
        
        /* Glass UI Kit */
        .glass-card {
            background-color: var(--card-background-color);
            backdrop-filter: blur(var(--blur-intensity));
            -webkit-backdrop-filter: blur(var(--blur-intensity));
            border-radius: var(--border-radius-large);
            border: 1px solid var(--card-border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform var(--transition-duration) var(--cubic-bezier), 
                        background-color var(--transition-duration) var(--cubic-bezier);
        }

        .glass-card:hover {
            transform: translateY(-5px);
            background-color: rgba(44, 44, 46, 0.7);
        }
        
        .apple-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            font-weight: 600;
            border-radius: var(--border-radius-small);
            padding: 14px 24px;
            border: none;
            cursor: pointer;
            transition: transform 0.2s var(--cubic-bezier), background-color 0.2s ease;
        }

        .apple-btn.primary {
            background: linear-gradient(135deg, var(--primary-accent-color), var(--secondary-accent-color));
            color: white;
            box-shadow: 0 5px 15px rgba(10, 132, 255, 0.3);
        }

        .apple-btn.secondary {
            background-color: rgba(120, 120, 128, 0.24);
            color: var(--primary-text-color);
        }

        .apple-btn:active {
            transform: scale(0.96);
        }
        .apple-btn.primary:active { background: linear-gradient(135deg, #0073e6, #504ee0); }
        .apple-btn.secondary:active { background-color: rgba(120, 120, 128, 0.36); }

        /* Animation */
        .animate-in {
            animation: fade-in-up 0.6s var(--cubic-bezier) forwards;
            opacity: 0;
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Servers Screen */
        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 16px;
        }

        .server-item {
            background-color: var(--card-background-color);
            border-radius: var(--border-radius-medium);
            padding: 16px;
            text-align: center;
            cursor: pointer;
            border: 1px solid var(--card-border-color);
            transition: all var(--transition-duration) var(--cubic-bezier);
            position: relative;
            overflow: hidden;
        }
        .server-item:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
        }
        .server-item:hover {
            transform: translateY(-5px);
            background-color: rgba(44, 44, 46, 0.8);
            border-color: rgba(80, 80, 87, 0.5);
        }

        .server-name {
            font-weight: 600;
            font-size: 15px;
            margin-top: 8px;
        }

        /* Market Screen */
        .market-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header-title {
            font-size: 28px;
            font-weight: 700;
        }

        .segmented-control {
            display: flex;
            width: 100%;
            background-color: rgba(120, 120, 128, 0.24);
            border-radius: var(--border-radius-small);
            padding: 4px;
            margin-bottom: 24px;
        }
        .segmented-control .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 15px;
            font-weight: 500;
            color: var(--secondary-text-color);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s var(--cubic-bezier);
        }
        .segmented-control .tab.active {
            background-color: rgba(120, 120, 128, 0.36);
            color: var(--primary-text-color);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }
        .tab-icon {
            margin-right: 6px;
        }

        .item-card {
            padding: 16px;
            margin-bottom: 16px;
            cursor: pointer;
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .item-title {
            font-size: 20px;
            font-weight: 600;
        }
        .item-description {
            font-size: 15px;
            color: var(--secondary-text-color);
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-price {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-accent-color), var(--secondary-accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid;
        }

        /* Profile Screen */
        .profile-header {
            padding: 32px 24px;
            text-align: center;
            margin-bottom: 24px;
        }
        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-accent-color), var(--secondary-accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 500;
            margin: 0 auto 16px;
            box-shadow: 0 8px 25px rgba(10, 132, 255, 0.3);
        }
        .profile-name { font-size: 26px; font-weight: 600; }
        .profile-username { font-size: 17px; color: var(--secondary-text-color); margin-bottom: 16px; }
        .rank {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            color: white;
        }
        .rank-novice { background: linear-gradient(135deg, #34c759, #289c45); }
        .rank-trader { background: linear-gradient(135deg, #ff9500, #c67600); }
        .rank-master { background: linear-gradient(135deg, #af52de, #893cb8); }
        .rank-legend { background: linear-gradient(135deg, #ff3b30, #c62d24); }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            padding: 20px;
            text-align: center;
            background-color: var(--card-background-color);
            border-radius: var(--border-radius-medium);
            border: 1px solid var(--card-border-color);
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.1;
        }
        .stat-label { color: var(--secondary-text-color); font-size: 14px; }

        .list-item-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 18px 20px;
            margin-bottom: 12px;
            text-align: left;
            border: 1px solid var(--card-border-color);
        }
        .list-item-btn:hover { background-color: rgba(44, 44, 46, 0.8); }

        /* Forms */
        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 16px;
            background-color: rgba(120, 120, 128, 0.24);
            border: 1px solid transparent;
            border-radius: var(--border-radius-small);
            color: var(--primary-text-color);
            font-size: 17px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
            -webkit-appearance: none;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-accent-color);
            background-color: rgba(120, 120, 128, 0.36);
        }
        ::placeholder { color: var(--secondary-text-color); }
        
        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            margin-bottom: 20px;
        }
        .checkbox-container span { font-size: 17px; }
        input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background-color: rgba(120, 120, 128, 0.24);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        input[type="checkbox"]:checked {
            background-color: var(--primary-accent-color);
        }
        input[type="checkbox"]:checked::before {
            content: '✔';
            position: absolute;
            color: white;
            font-size: 18px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }


        /* Misc */
        .hidden { display: none; }
        .page-title { text-align: center; font-size: 34px; font-weight: 700; margin-bottom: 24px; }
        .empty-state {
            padding: 60px 24px;
            text-align: center;
        }
        .empty-state .icon { font-size: 56px; margin-bottom: 16px; opacity: 0.6; }
        .empty-state p { color: var(--secondary-text-color); font-size: 17px; }
    </style>
</head>
<body>
    <div class="background-glow"></div>
    <div id="app" class="container"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        tg.setHeaderColor('black');
        
        // ========== 90 СЕРВЕРОВ ==========
        const SERVERS = [
            {id:1,name:"RED",color:"#FF3B30"},{id:2,name:"GREEN",color:"#34C759"},{id:3,name:"BLUE",color:"#0A84FF"},{id:4,name:"YELLOW",color:"#FFCC00"},{id:5,name:"ORANGE",color:"#FF9500"},{id:6,name:"PURPLE",color:"#AF52DE"},{id:7,name:"LIME",color:"#ccff00"},{id:8,name:"PINK",color:"#FF2D55"},{id:9,name:"CHERRY",color:"#AC3939"},{id:10,name:"BLACK",color:"#8E8E93"},{id:11,name:"INDIGO",color:"#5856D6"},{id:12,name:"WHITE",color:"#FFFFFF"},{id:13,name:"MAGENTA",color:"#C406C4"},{id:14,name:"CRIMSON",color:"#D9133B"},{id:15,name:"GOLD",color:"#F1B61F"},{id:16,name:"AZURE",color:"#3097FF"},{id:17,name:"PLATINUM",color:"#868480"},{id:18,name:"AQUA",color:"#0DEDED"},{id:19,name:"GRAY",color:"#C7C2C1"},{id:20,name:"ICE",color:"#B6F1FE"},{id:21,name:"CHILLI",color:"#FE2726"},{id:22,name:"CHOCO",color:"#BF835C"},{id:23,name:"MOSCOW",color:"#FF2B3B"},{id:24,name:"SPB",color:"#11A6FA"},{id:25,name:"UFA",color:"#FFBA08"},{id:26,name:"SOCHI",color:"#01AFD6"},{id:27,name:"KAZAN",color:"#007DB2"},{id:28,name:"SAMARA",color:"#82339D"},{id:29,name:"ROSTOV",color:"#FBB040"},{id:30,name:"ANAPA",color:"#24ACF8"},{id:31,name:"EKB",color:"#93F0A4"},{id:32,name:"KRASNODAR",color:"#A03429"},{id:33,name:"ARZAMAS",color:"#FFF72D"},{id:34,name:"NOVOSIB",color:"#99D53B"},{id:35,name:"GROZNY",color:"#009622"},{id:36,name:"SARATOV",color:"#0597EB"},{id:37,name:"OMSK",color:"#58E1A5"},{id:38,name:"IRKUTSK",color:"#06E1FF"},{id:39,name:"VOLGOGRAD",color:"#FE0000"},{id:40,name:"VORONEZH",color:"#FFF200"},{id:41,name:"BELGOROD",color:"#0039A6"},{id:42,name:"MAKHACHKALA",color:"#42AD42"},{id:43,name:"VLADIKAVKAZ",color:"#8EB0D9"},{id:44,name:"VLADIVOSTOK",color:"#3A95FF"},{id:45,name:"KALININGRAD",color:"#F0EBC9"},{id:46,name:"CHELYABINSK",color:"#FF6B00"},{id:47,name:"KRASNOYARSK",color:"#D99D1C"},{id:48,name:"CHEBOKSARY",color:"#6CBB74"},{id:49,name:"KHABAROVSK",color:"#0184C4"},{id:50,name:"PERM",color:"#FFD700"},{id:51,name:"TULA",color:"#F2B647"},{id:52,name:"RYAZAN",color:"#C659EB"},{id:53,name:"MURMANSK",color:"#396797"},{id:54,name:"PENZA",color:"#53E295"},{id:55,name:"KURSK",color:"#9E1C00"},{id:56,name:"ARKHANGELSK",color:"#FF007A"},{id:57,name:"ORENBURG",color:"#E39012"},{id:58,name:"KIROV",color:"#939393"},{id:59,name:"KEMEROVO",color:"#F61A1B"},{id:60,name:"TYUMEN",color:"#44C9F3"},{id:61,name:"TOLYATTI",color:"#8F00FF"},{id:62,name:"IVANOVO",color:"#D5AF80"},{id:63,name:"STAVROPOL",color:"#3F6BE9"},{id:64,name:"SMOLENSK",color:"#EE703E"},{id:65,name:"PSKOV",color:"#63A62E"},{id:66,name:"BRYANSK",color:"#26EEBE"},{id:67,name:"OREL",color:"#FFEA03"},{id:68,name:"YAROSLAVL",color:"#D01D0D"},{id:69,name:"BARNAUL",color:"#797CC7"},{id:70,name:"LIPETSK",color:"#CCD0DA"},{id:71,name:"ULYANOVSK",color:"#B55624"},{id:72,name:"YAKUTSK",color:"#44BFFC"},{id:73,name:"TAMBOV",color:"#959595"},{id:74,name:"BRATSK",color:"#e0c1a0"},{id:75,name:"ASTRAKHAN",color:"#F7243A"},{id:76,name:"CHITA",color:"#35CA68"},{id:77,name:"KOSTROMA",color:"#F1B10D"},{id:78,name:"VLADIMIR",color:"#F58041"},{id:79,name:"KALUGA",color:"#3032A4"},{id:80,name:"NOVGOROD",color:"#FFC700"},{id:81,name:"TAGANROG",color:"#984FCF"},{id:82,name:"VOLOGDA",color:"#F54141"},{id:83,name:"TVER",color:"#84B6FF"},{id:84,name:"TOMSK",color:"#00e9b2"},{id:85,name:"IZHEVSK",color:"#00A2A4"},{id:86,name:"SURGUT",color:"#4F27DE"},{id:87,name:"PODOLSK",color:"#B7A67E"},{id:88,name:"MAGADAN",color:"#B1C1C7"},{id:89,name:"CHEREPOVETS",color:"#3885E9"},{id:90,name:"NORILSK",color:"#AED4F6"}
        ];
        
        let state = {
            view: 'servers', currentServer: null, user: null, items: [], myOrders: [], loading: false, currentCategory: 'all'
        };
        
        function callBot(action, data = {}) {
            return new Promise((resolve) => {
                const id = Date.now() + '_' + Math.random();
                window[id] = resolve;
                tg.sendData(JSON.stringify({ action, ...data, _id: id }));
                setTimeout(() => { if (window[id]) { delete window[id]; resolve(null); } }, 10000);
            });
        }
        
        function showToast(msg, type = 'info') {
            tg.showPopup({
                title: type === 'success' ? 'Успех' : type === 'error' ? 'Ошибка' : 'Информация',
                message: msg,
                buttons: [{type: 'ok'}]
            });
        }
        
        async function loadProfile() { if (!state.user) { const res = await callBot('get_profile'); if (res) state.user = res; } }
        async function loadItems() {
            if (!state.currentServer) return;
            state.loading = true; render();
            const res = await callBot('get_items', { server_id: state.currentServer.id, category: state.currentCategory === 'all' ? null : state.currentCategory });
            if (res) state.items = res;
            state.loading = false; render();
        }
        async function loadMyOrders() { const res = await callBot('my_orders'); if (res) state.myOrders = res; }
        
        async function createItem(data) {
            const res = await callBot('create_item', data);
            if (res?.success) { showToast('Объявление опубликовано!', 'success'); await loadItems(); state.view = 'market'; render(); }
            else { showToast('Ошибка: ' + (res?.error || 'Неизвестная ошибка'), 'error'); }
        }
        
        async function buyItem(itemId) {
            tg.showConfirm(`Вы уверены, что хотите купить этот товар?`, async (confirmed) => {
                if (confirmed) {
                    const res = await callBot('buy_item', { item_id: itemId });
                    if (res?.success) { showToast('Сделка создана! Проверьте "Мои сделки"', 'success'); await loadMyOrders(); render(); }
                    else { showToast('Ошибка: ' + (res?.error || 'Не удалось'), 'error'); }
                }
            });
        }
        
        async function confirmOrder(orderId) {
            tg.showConfirm(`Подтвердить получение товара? Это действие необратимо.`, async (confirmed) => {
                if (confirmed) {
                    const res = await callBot('confirm_order', { order_id: orderId });
                    if (res?.success) { showToast('Сделка успешно завершена!', 'success'); await loadMyOrders(); await loadProfile(); render(); }
                    else { showToast('Ошибка подтверждения', 'error'); }
                }
            });
        }
        
        function getRank(deals) {
            if (deals >= 50) return { name: '👑 Легенда', class: 'rank-legend' };
            if (deals >= 20) return { name: '⭐ Мастер', class: 'rank-master' };
            if (deals >= 5) return { name: '🌟 Торговец', class: 'rank-trader' };
            return { name: '🌱 Новичок', class: 'rank-novice' };
        }
        
        // ========== COMPONENTS ==========
        function BackButton(view) {
            return `<button class="apple-btn secondary" style="padding: 10px 16px;" onclick="window.navigate('${view}')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>`;
        }

        const ICONS = {
            all: `<svg width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 13a1 1 0 100-2 1 1 0 000 2zM19 13a1 1 0 100-2 1 1 0 000 2zM5 13a1 1 0 100-2 1 1 0 000 2z"></path></svg>`,
            car: `🚗`, house: `🏠`, skin: `🎨`, money: `💰`, accessory: `💎`, server: `🖥️`,
            rating: `⭐`, deals: `📦`, sales: `🛒`, purchases: `🛍️`, empty: `📭`,
        };

        function renderServers() {
            return `
                <div class="animate-in">
                    <div style="text-align: center; margin: 32px 0;">
                        <h1 class="page-title" style="margin-bottom: 8px;">TradeMarket</h1>
                        <p style="color: var(--secondary-text-color); font-size: 17px;">Выберите игровой сервер</p>
                    </div>
                    <div class="servers-grid">
                        ${SERVERS.map(s => `
                            <div class="server-item" data-id="${s.id}" style="--server-color: ${s.color};">
                                <div style="font-size: 32px; margin-bottom: 8px;">${ICONS.server}</div>
                                <div class="server-name">${s.name}</div>
                            </div>
                        `).join('')}
                    </div>
                     <div style="position: fixed; bottom: 16px; left: 16px; right: 16px; max-width: 600px; margin: 0 auto;">
                        <button class="apple-btn secondary list-item-btn" style="width: 100%; backdrop-filter: blur(20px);" onclick="window.navigate('profile')">
                            <span>Профиль</span>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </div>
                </div>
            `;
        }
        
        function renderMarket() {
            const categories = [
                {id:'all',name:'Все',icon:ICONS.all},{id:'car',name:'Машины',icon:ICONS.car},{id:'house',name:'Дома',icon:ICONS.house},
                {id:'skin',name:'Скины',icon:ICONS.skin},{id:'money',name:'Валюта',icon:ICONS.money},{id:'accessory',name:'Аксессуары',icon:ICONS.accessory}
            ];
            
            return `
                <div class="animate-in">
                    <div class="market-header">
                        ${BackButton('servers')}
                        <h2 class="header-title" style="color: ${state.currentServer?.color};">${state.currentServer?.name}</h2>
                        <button class="apple-btn primary" style="padding: 10px 16px;" onclick="window.navigate('create')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </div>
                    
                    <div class="segmented-control">
                        ${categories.map(cat => `
                            <div class="tab ${state.currentCategory === cat.id ? 'active' : ''}" onclick="window.setCategory('${cat.id}')"><span class="tab-icon">${cat.icon}</span> ${cat.name}</div>
                        `).join('')}
                    </div>
                    
                    ${state.loading ? `<div class="glass-card" style="height: 200px; display: flex; align-items: center; justify-content: center;">Загрузка...</div>` :
                    state.items.length === 0 ? `
                        <div class="glass-card empty-state">
                            <div class="icon">${ICONS.empty}</div>
                            <p>Здесь пока нет объявлений</p>
                            <button class="apple-btn primary" style="margin-top: 24px;" onclick="window.navigate('create')">Создать первое</button>
                        </div>
                    ` : state.items.map(item => `
                        <div class="glass-card item-card" onclick="window.buyItem('${item.item_id}')">
                            <div class="item-header">
                                <div class="badge" style="background-color: ${state.currentServer?.color}33; color: ${state.currentServer?.color}; border-color: ${state.currentServer?.color}80;">${state.currentServer?.name}</div>
                                <span style="color: var(--secondary-text-color); font-size: 14px; font-weight: 500;">${ICONS.rating} ${item.seller_rating || 0}</span>
                            </div>
                            <h3 class="item-title">${item.name}</h3>
                            <p class="item-description">${item.description || 'Без описания'}</p>
                            <div class="item-footer">
                                <span class="item-price">${(item.price || 0).toLocaleString()} ₽</span>
                                <button class="apple-btn primary" style="padding: 10px 22px;">Купить</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderProfile() {
            const u = state.user || { first_name: '...', rating: 0, deals: 0, seller_deals: 0, buyer_deals: 0 };
            const rank = getRank(u.deals || 0);
            
            return `
                <div class="animate-in">
                    <div class="market-header" style="justify-content: flex-start; gap: 16px;">
                        ${BackButton('servers')}
                        <h2 class="header-title">Профиль</h2>
                    </div>
                    
                    <div class="glass-card profile-header">
                        <div class="avatar">${u.first_name?.charAt(0) || '👤'}</div>
                        <h3 class="profile-name">${u.first_name}</h3>
                        <p class="profile-username">@${u.username || 'user'}</p>
                        <div class="rank ${rank.class}">${rank.name}</div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-value">${u.rating || 0}</div><div class="stat-label">${ICONS.rating} Рейтинг</div></div>
                        <div class="stat-card"><div class="stat-value">${u.deals || 0}</div><div class="stat-label">${ICONS.deals} Сделок</div></div>
                        <div class="stat-card"><div class="stat-value">${u.seller_deals || 0}</div><div class="stat-label">${ICONS.sales} Продаж</div></div>
                        <div class="stat-card"><div class="stat-value">${u.buyer_deals || 0}</div><div class="stat-label">${ICONS.purchases} Покупок</div></div>
                    </div>
                    
                    <button class="apple-btn secondary list-item-btn" onclick="window.navigate('orders')">
                        <span>Мои сделки</span>
                        <span style="color: var(--secondary-text-color); display: flex; align-items: center; gap: 8px;">
                            ${state.myOrders.length}
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </span>
                    </button>
                    <button class="apple-btn primary" style="width: 100%; margin-top: 8px;" onclick="window.navigate('create')">Продать товар</button>
                </div>
            `;
        }
        
        function renderOrders() {
            return `
                <div class="animate-in">
                    <div class="market-header" style="justify-content: space-between;">
                        ${BackButton('profile')}
                        <h2 class="header-title">Мои сделки</h2>
                        <button class="apple-btn secondary" style="padding: 10px;" onclick="window.loadMyOrders()">
                             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M21 3L15 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </div>
                    
                    ${state.myOrders.length === 0 ? `
                        <div class="glass-card empty-state">
                            <div class="icon">${ICONS.empty}</div>
                            <p>Нет активных сделок</p>
                        </div>
                    ` : state.myOrders.map(order => `
                        <div class="glass-card" style="padding: 16px; margin-bottom: 12px;">
                            <div class="item-header" style="margin-bottom: 4px;">
                                <span style="font-weight: 600;">${order.item_name}</span>
                                <span class="badge" style="background-color:${order.status === 'completed' ? '#34C759' : '#FF9500'}33; color:${order.status === 'completed' ? '#34C759' : '#FF9500'}; border:none;">${order.status === 'pending' ? '⏳ Ожидает' : '✅ Завершено'}</span>
                            </div>
                            <div style="color: var(--secondary-text-color); margin-bottom: 12px; font-size: 15px;">${order.is_buyer ? 'Продавец' : 'Покупатель'}: @${order.other_user}</div>
                            <div class="item-price" style="margin-bottom: 16px;">${(order.price || 0).toLocaleString()} ₽</div>
                            ${order.status === 'pending' && order.is_buyer ? `
                                <button class="apple-btn primary" style="width: 100%;" onclick="window.confirmOrder('${order.order_id}')">Подтвердить получение</button>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function renderCreateForm() {
            return `
                <div class="animate-in">
                    <div class="market-header" style="justify-content: flex-start; gap: 16px;">
                        ${BackButton('market')}
                        <h2 class="header-title">Новое объявление</h2>
                    </div>
                    <div class="glass-card" style="padding: 24px;">
                        <select id="catSelect">
                            <option value="car">${ICONS.car} Машина</option><option value="house">${ICONS.house} Дом</option><option value="skin">${ICONS.skin} Скин</option>
                            <option value="money">${ICONS.money} Валюта</option><option value="accessory">${ICONS.accessory} Аксессуар</option>
                        </select>
                        <input type="text" id="itemName" placeholder="Название товара">
                        <textarea id="itemDesc" rows="4" placeholder="Краткое описание (необязательно)"></textarea>
                        <input type="number" id="itemPrice" placeholder="Цена в рублях">
                        <div class="checkbox-container">
                            <span>Возможность торга</span>
                            <input type="checkbox" id="itemHaggle" checked>
                        </div>
                        <button class="apple-btn primary" style="width: 100%;" onclick="window.submitCreate()">Опубликовать</button>
                    </div>
                </div>
            `;
        }
        
        // Global functions
        window.navigate = async (view) => {
            state.view = view;
            if (view === 'profile') { await loadProfile(); await loadMyOrders(); }
            if (view === 'orders') await loadMyOrders();
            if (view === 'market' && state.currentServer) await loadItems();
            render();
        };
        
        window.selectServer = (id) => {
            state.currentServer = SERVERS.find(s => s.id === id);
            navigate('market');
        };
        
        window.setCategory = (cat) => { state.currentCategory = cat; loadItems(); };
        window.buyItem = buyItem;
        window.confirmOrder = confirmOrder;
        
        window.submitCreate = () => {
            const data = {
                server_id: state.currentServer.id,
                category: document.getElementById('catSelect')?.value,
                name: document.getElementById('itemName')?.value,
                description: document.getElementById('itemDesc')?.value,
                price: parseInt(document.getElementById('itemPrice')?.value),
                haggle: document.getElementById('itemHaggle')?.checked || false
            };
            if (!data.name || !data.price) { showToast('Заполните название и цену', 'error'); return; }
            createItem(data);
        };
        
        window.loadProfile = async () => { await callBot('get_profile'); render(); };
        window.loadMyOrders = async () => { await loadMyOrders(); render(); };
        
        function render() {
            const views = { servers: renderServers, market: renderMarket, profile: renderProfile, orders: renderOrders, create: renderCreateForm };
            document.getElementById('app').innerHTML = (views[state.view] || renderServers)();
            
            if (state.view === 'servers') {
                document.querySelectorAll('.server-item').forEach(card => {
                    card.style.setProperty('--server-color', card.style.getPropertyValue('--server-color'));
                    card.addEventListener('click', () => window.selectServer(parseInt(card.dataset.id)));
                });
            }
        }
        
        // Initial Load
        loadProfile().then(render);
    </script>
</body>
</html>
