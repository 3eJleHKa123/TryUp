<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TradeMarket — Dark Premium Plates iOS 26</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* Динамический цвет (меняется при выборе сервера) */
            --active-color: #0A84FF; 
            
            --bg-deep: #050507;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.45);
            
            /* Рельефное стекло + динамическое переливание */
            --glass-base: rgba(18, 18, 22, 0.5);
            --glass-blur: blur(40px) saturate(200%);
            
            --relief-shadow: 
                15px 15px 35px rgba(0, 0, 0, 0.8), 
                -5px -5px 15px rgba(255, 255, 255, 0.02),
                inset 1px 1px 2px rgba(255, 255, 255, 0.1),
                inset -1px -1px 4px rgba(0, 0, 0, 0.7);
                
            --relief-shadow-active: 
                inset 4px 4px 10px rgba(0, 0, 0, 0.9),
                inset -2px -2px 5px rgba(255, 255, 255, 0.05);

            --radius-lg: 24px;
            --radius-md: 16px;
            
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --smooth: cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        body {
            background-color: var(--bg-deep); color: var(--text-main);
            min-height: 100vh; overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Фоновые эффекты: Шум + Цветные Ауры */
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999;
            pointer-events: none; opacity: 0.04; mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .dark-aurora {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--active-color) 15%, transparent) 0%, transparent 60%),
                        radial-gradient(circle at 10% 100%, rgba(94, 92, 230, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 90% 100%, color-mix(in srgb, var(--active-color) 10%, transparent) 0%, transparent 50%);
            transition: background 0.8s ease;
        }

        .container {
            max-width: 600px; margin: 0 auto; padding: 24px 16px 140px 16px; min-height: 100vh;
            position: relative; z-index: 1;
            overflow: visible;
        }

        /* БАЗОВЫЙ КЛАСС СТЕКЛА + АНИМАЦИЯ ПЕРЕЛИВАНИЯ РЕЛЬЕФА */
        .glass-relief {
            background: var(--glass-base);
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius-lg);
            box-shadow: var(--relief-shadow);
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative; overflow: hidden;
            transition: box-shadow 0.4s var(--spring);
        }
        .glass-relief::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            opacity: 0.5;
        }
        /* ДИНАМИЧЕСКОЕ ПЕРЕЛИВАНИЕ СТЕКЛА (shine sweep) */
        .glass-relief::after {
            content: '';
            position: absolute;
            inset: -50% -150% -50% -150%;
            background: linear-gradient(100deg, transparent, rgba(255,255,255,0.28), transparent);
            transform: skewX(-25deg);
            animation: glassShine 7s linear infinite;
            pointer-events: none;
            z-index: 2;
            opacity: 0.13;
            mix-blend-mode: overlay;
        }

        /* ---------------------------------------------------
           ИСПРАВЛЕНИЕ: ТАБЫ — ТЕНИ БОЛЬШЕ НЕ ОБРЕЗАЮТСЯ
           --------------------------------------------------- */
        .tabs-scroll-wrapper {
            margin: 0 -16px;
            padding: 20px 20px 72px 20px; /* Увеличено для полноценной тени + glow tab-item.active */
            margin-bottom: -52px;
            overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
        }
        .tabs-scroll-wrapper::-webkit-scrollbar { display: none; }
        
        .segmented-tabs { display: inline-flex; gap: 12px; width: max-content; }
        
        .tab-item {
            padding: 12px 22px; font-size: 15px; font-weight: 700; border-radius: 20px;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-muted); cursor: pointer; white-space: nowrap;
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5); 
            transition: all 0.3s var(--spring);
            position: relative; overflow: hidden;
        }
        .tab-item.active {
            background: var(--active-color); color: #fff; border-color: rgba(255,255,255,0.3);
            box-shadow: 0 12px 30px color-mix(in srgb, var(--active-color) 65%, transparent),
                        inset 1px 1px 3px rgba(255,255,255,0.5);
        }
        /* Лёгкое переливание и на табах */
        .tab-item::after {
            content: '';
            position: absolute;
            inset: -50% -150% -50% -150%;
            background: linear-gradient(100deg, transparent, rgba(255,255,255,0.25), transparent);
            transform: skewX(-25deg);
            animation: glassShine 9s linear infinite;
            pointer-events: none;
            opacity: 0.08;
            z-index: 1;
        }
        .tab-item.active::after { opacity: 0.22; animation-duration: 3s; }

        /* ---------------------------------------------------
           СЕРВЕРЫ: ПРЯМОУГОЛЬНЫЕ ПЛАШКИ + ЗУМ В ЦЕНТРЕ + ПЕРЕЛИВАНИЕ
           --------------------------------------------------- */
        .servers-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 14px; 
        }
        
        .server-plate {
            position: relative;
            background: rgba(20, 20, 25, 0.5);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            border-bottom: 1px solid color-mix(in srgb, var(--srv-color) 30%, transparent);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 -2px 15px color-mix(in srgb, var(--srv-color) 10%, transparent);
            cursor: pointer; overflow: hidden;
            transition: all 0.3s var(--spring);
            transform: scale(1); /* для зума */
        }
        /* Переливание рельефа на серверах */
        .server-plate::before {
            content: '';
            position: absolute;
            inset: -50% -150% -50% -150%;
            background: linear-gradient(100deg, transparent, rgba(255,255,255,0.28), transparent);
            transform: skewX(-25deg);
            animation: glassShine 6s linear infinite;
            pointer-events: none;
            z-index: 1;
            opacity: 0.16;
        }
        .server-plate::after {
            content: ''; position: absolute; top: 0; right: 0; width: 60px; height: 100%;
            background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--srv-color) 15%, transparent));
            pointer-events: none;
            z-index: 2;
        }

        .server-plate-name {
            font-size: 15px; font-weight: 800; color: #fff;
            letter-spacing: 0.5px; z-index: 3;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        .server-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--srv-color);
            box-shadow: 0 0 12px var(--srv-color), 0 0 24px var(--srv-color), inset 1px 1px 2px rgba(255,255,255,0.8);
            z-index: 3;
            animation: neonPulse 2.8s ease-in-out infinite;
        }

        .server-plate:active {
            transform: scale(0.93);
            box-shadow: var(--relief-shadow-active), 0 0 15px color-mix(in srgb, var(--srv-color) 30%, transparent);
            border-top-color: rgba(255, 255, 255, 0.05);
        }

        /* 3D Кнопки с улучшенным переливанием */
        .btn-3d {
            display: inline-flex; align-items: center; justify-content: center;
            width: 100%; padding: 18px 24px; font-size: 17px; font-weight: 700; letter-spacing: 0.5px;
            border-radius: var(--radius-md); border: none; cursor: pointer; color: #fff;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(0,0,0,0.4));
            box-shadow: 0 10px 25px color-mix(in srgb, var(--active-color) 40%, transparent), inset 1px 1px 2px rgba(255,255,255,0.3), inset -1px -1px 4px rgba(0,0,0,0.5);
            border: 1px solid color-mix(in srgb, var(--active-color) 50%, transparent);
            position: relative; overflow: hidden; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .btn-3d::after {
            content: '';
            position: absolute;
            inset: -50% -150% -50% -150%;
            background: linear-gradient(100deg, transparent, rgba(255,255,255,0.35), transparent);
            transform: skewX(-25deg);
            animation: glassShine 8s linear infinite;
            pointer-events: none;
            opacity: 0.12;
            z-index: 2;
        }
        .btn-3d:active {
            transform: scale(0.94) translateY(2px);
            box-shadow: var(--relief-shadow-active), 0 0 15px color-mix(in srgb, var(--active-color) 60%, transparent);
        }
        .btn-3d:active::after {
            animation-duration: 1.2s;
            opacity: 0.35;
        }

        .btn-icon {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(145deg, rgba(40,40,45,0.8), rgba(15,15,20,0.8));
            box-shadow: var(--relief-shadow); border: 1px solid rgba(255,255,255,0.05);
            color: var(--active-color); cursor: pointer; transition: all 0.3s var(--spring);
        }
        .btn-icon:active { transform: scale(0.85); box-shadow: var(--relief-shadow-active); }

        .fab-container {
            position: fixed; bottom: 30px; left: 16px; right: 16px;
            display: flex; justify-content: center; z-index: 100; pointer-events: none;
        }
        .fab-btn {
            pointer-events: auto; width: 100%; max-width: 400px;
            background: var(--active-color); padding: 18px 32px; border-radius: 30px;
            font-weight: 800; font-size: 16px; color: #fff;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 15px 35px color-mix(in srgb, var(--active-color) 60%, transparent), inset 2px 2px 5px rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.2); animation: float-up 0.8s var(--spring) forwards; transition: all 0.3s var(--spring);
        }
        .fab-btn:active { transform: scale(0.9); box-shadow: 0 5px 15px color-mix(in srgb, var(--active-color) 40%, transparent); }

        /* АНИМАЦИИ */
        @keyframes glassShine {
            0% { transform: translateX(-150%) skewX(-25deg); }
            100% { transform: translateX(300%) skewX(-25deg); }
        }
        @keyframes neonPulse {
            0%, 100% { box-shadow: 0 0 12px var(--srv-color), 0 0 24px var(--srv-color), inset 1px 1px 2px rgba(255,255,255,0.8); }
            50% { box-shadow: 0 0 22px var(--srv-color), 0 0 44px var(--srv-color), inset 1px 1px 2px rgba(255,255,255,0.8); }
        }
        .page-enter { animation: zoom-fade-in 0.6s var(--spring) forwards; transform-origin: top center; }
        @keyframes zoom-fade-in { 0% { opacity: 0; transform: scale(0.92) translateY(30px); filter: blur(10px); } 100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); } }
        .stagger-item { opacity: 0; animation: slide-in-right 0.5s var(--spring) forwards; }
        @keyframes slide-in-right { 0% { opacity: 0; transform: translateX(30px) scale(0.95); } 100% { opacity: 1; transform: translateX(0) scale(1); } }
        @keyframes float-up { 0% { opacity: 0; transform: translateY(50px) scale(0.8); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

        /* ОСТАЛЬНЫЕ ЭЛЕМЕНТЫ */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; position: relative; }
        .header-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.5) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 4px 20px color-mix(in srgb, var(--active-color) 30%, transparent); }

        .market-card { padding: 20px; margin-bottom: 20px; cursor: pointer; }
        .market-card:active { transform: scale(0.96); }
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .card-badge { background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--active-color); border: 1px solid color-mix(in srgb, var(--active-color) 30%, transparent); box-shadow: 0 0 10px color-mix(in srgb, var(--active-color) 20%, transparent); }
        .card-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
        .card-desc { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 16px; }
        .card-price { font-size: 26px; font-weight: 900; background: linear-gradient(135deg, #fff, var(--text-muted)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .buy-mini-btn { background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 14px; border: 1px solid color-mix(in srgb, var(--active-color) 50%, transparent); color: var(--active-color); font-weight: 700; }

        .input-group { margin-bottom: 20px; position: relative; }
        .glass-input { width: 100%; padding: 20px; font-size: 16px; color: #fff; background: rgba(0,0,0,0.3); border-radius: var(--radius-md); border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 2px 2px 8px rgba(0,0,0,0.6), inset -1px -1px 2px rgba(255,255,255,0.05); outline: none; transition: 0.3s; -webkit-appearance: none; }
        .glass-input:focus { border-color: var(--active-color); background: rgba(0,0,0,0.5); box-shadow: inset 2px 2px 8px rgba(0,0,0,0.8), 0 0 15px color-mix(in srgb, var(--active-color) 30%, transparent); }

        .toggle-ios { appearance: none; -webkit-appearance: none; width: 56px; height: 32px; background: rgba(0,0,0,0.4); border-radius: 30px; position: relative; cursor: pointer; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.6); outline: none; transition: 0.4s var(--spring); border: 1px solid rgba(255,255,255,0.05); }
        .toggle-ios::after { content: ''; position: absolute; top: 2px; left: 2px; width: 26px; height: 26px; background: #fff; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.5), inset -1px -1px 2px rgba(0,0,0,0.2); transition: 0.4s var(--spring); }
        .toggle-ios:checked { background: var(--active-color); box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4), 0 0 15px color-mix(in srgb, var(--active-color) 50%, transparent); }
        .toggle-ios:checked::after { transform: translateX(24px); }

        .hologram-avatar { width: 130px; height: 130px; margin: 0 auto 24px; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; font-size: 50px; background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(0,0,0,0.6)); box-shadow: var(--relief-shadow), 0 0 30px color-mix(in srgb, var(--active-color) 30%, transparent); border: 2px solid rgba(255,255,255,0.1); }
        .hologram-avatar::before { content: ''; position: absolute; inset: -5px; border-radius: 50%; background: conic-gradient(from 0deg, transparent, var(--active-color), transparent 50%); animation: spin 4s linear infinite; z-index: -1; filter: blur(10px); opacity: 0.5; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .svg-icon { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        
        /* Дополнительные стили для поиска и фильтров */
        .search-wrap { position: relative; margin-bottom: 20px; }
        .search-wrap .ico { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
        input.search {
            width: 100%; padding: 14px 16px 14px 44px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 999px; color: var(--text-main); font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input.search:focus { border-color: var(--active-color); box-shadow: 0 0 0 3px color-mix(in srgb, var(--active-color) 15%, transparent); }
        
        .filter-bar { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 4px; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-chip {
            white-space: nowrap; padding: 8px 16px; border-radius: 999px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.15s; flex-shrink: 0;
        }
        .filter-chip.active { background: var(--active-color); border-color: var(--active-color); color: white; }
        
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 20px; height: 120px; margin-bottom: 16px; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        
        .chat-messages { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .message { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; }
        .message.in { background: rgba(255,255,255,0.08); align-self: flex-start; border-bottom-left-radius: 4px; }
        .message.out { background: var(--active-color); align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
            background: rgba(13,13,15,0.92);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex; padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
        }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0; cursor: pointer; color: rgba(255,255,255,0.5); }
        .tab-item.active { color: var(--active-color); }
        .tab-ico { font-size: 22px; transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1); }
        .tab-item.active .tab-ico { transform: scale(1.15); }
        .tab-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }
    </style>
</head>

            {id:43,name:"VLADIKAVKAZ",color:"#8EB0D9"},{id:44,name:"VLADIVOSTOK",color:"#3A95FF"},{id:45,name:"KALININGRAD",color:"#F0EBC9"},
            {id:46,name:"CHELYABINSK",color:"#FF6B00"},{id:47,name:"KRASNOYARSK",color:"#D99D1C"},{id:48,name:"CHEBOKSARY",color:"#6CBB74"},
            {id:49,name:"KHABAROVSK",color:"#0184C4"},{id:50,name:"PERM",color:"#FFD700"},{id:51,name:"TULA",color:"#F2B647"},
            {id:52,name:"RYAZAN",color:"#C659EB"},{id:53,name:"MURMANSK",color:"#396797"},{id:54,name:"PENZA",color:"#53E295"},
            {id:55,name:"KURSK",color:"#9E1C00"},{id:56,name:"ARKHANGELSK",color:"#FF007A"},{id:57,name:"ORENBURG",color:"#E39012"},
            {id:58,name:"KIROV",color:"#939393"},{id:59,name:"KEMEROVO",color:"#F61A1B"},{id:60,name:"TYUMEN",color:"#44C9F3"},
            {id:61,name:"TOLYATTI",color:"#8F00FF"},{id:62,name:"IVANOVO",color:"#D5AF80"},{id:63,name:"STAVROPOL",color:"#3F6BE9"},
            {id:64,name:"SMOLENSK",color:"#EE703E"},{id:65,name:"PSKOV",color:"#63A62E"},{id:66,name:"BRYANSK",color:"#26EEBE"},
            {id:67,name:"OREL",color:"#FFEA03"},{id:68,name:"YAROSLAVL",color:"#D01D0D"},{id:69,name:"BARNAUL",color:"#797CC7"},
            {id:70,name:"LIPETSK",color:"#CCD0DA"},{id:71,name:"ULYANOVSK",color:"#B55624"},{id:72,name:"YAKUTSK",color:"#44BFFC"},
            {id:73,name:"TAMBOV",color:"#959595"},{id:74,name:"BRATSK",color:"#e0c1a0"},{id:75,name:"ASTRAKHAN",color:"#F7243A"},
            {id:76,name:"CHITA",color:"#35CA68"},{id:77,name:"KOSTROMA",color:"#F1B10D"},{id:78,name:"VLADIMIR",color:"#F58041"},
            {id:79,name:"KALUGA",color:"#3032A4"},{id:80,name:"NOVGOROD",color:"#FFC700"},{id:81,name:"TAGANROG",color:"#984FCF"},
            {id:82,name:"VOLOGDA",color:"#F54141"},{id:83,name:"TVER",color:"#84B6FF"},{id:84,name:"TOMSK",color:"#00e9b2"},
            {id:85,name:"IZHEVSK",color:"#00A2A4"},{id:86,name:"SURGUT",color:"#4F27DE"},{id:87,name:"PODOLSK",color:"#B7A67E"},
            {id:88,name:"MAGADAN",color:"#B1C1C7"},{id:89,name:"CHEREPOVETS",color:"#3885E9"},{id:90,name:"NORILSK",color:"#AED4F6"}
        ];

        // ========== СОСТОЯНИЕ ==========
        let state = {
            tab: 'servers',
            currentServer: null,
            user: null,
            items: [],
            myOrders: [],
            loading: false,
            currentCategory: 'all',
            search: ''
        };

        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С БОТОМ ==========
        function callBot(action, data = {}) {
            return new Promise((resolve) => {
                const id = Date.now() + '_' + Math.random();
                window[id] = resolve;
                tg.sendData(JSON.stringify({ action, ...data, _id: id }));
                setTimeout(() => {
                    if (window[id]) { delete window[id]; resolve(null); }
                }, 10000);
            });
        }

        function showToast(msg, type) {
            tg.showPopup({ title: type === 'success' ? 'Успех' : type === 'error' ? 'Ошибка' : 'Инфо', message: msg, buttons: [{type: 'ok'}] });
        }

        // ========== ЗАГРУЗКА ДАННЫХ ==========
        async function loadProfile() {
            const res = await callBot('get_profile');
            if (res) state.user = res;
            render();
        }

        async function loadItems() {
            if (!state.currentServer) return;
            state.loading = true;
            render();
            const res = await callBot('get_items', { 
                server_id: state.currentServer.id, 
                category: state.currentCategory === 'all' ? null : state.currentCategory 
            });
            if (res) state.items = res;
            state.loading = false;
            render();
        }

        async function loadMyOrders() {
            const res = await callBot('my_orders');
            if (res) state.myOrders = res;
            render();
        }

        async function createItem(data) {
            const res = await callBot('create_item', data);
            if (res?.success) {
                showToast('Объявление опубликовано!', 'success');
                await loadItems();
                state.tab = 'market';
                render();
            } else {
                showToast('Ошибка: ' + (res?.error || 'Неизвестная ошибка'), 'error');
            }
        }

        async function buyItem(itemId) {
            const res = await callBot('buy_item', { item_id: itemId });
            if (res?.success) {
                showToast('Сделка создана!', 'success');
                await loadMyOrders();
                render();
            } else {
                showToast('Ошибка: ' + (res?.error || 'Не удалось'), 'error');
            }
        }

        async function confirmOrder(orderId) {
            const res = await callBot('confirm_order', { order_id: orderId });
            if (res?.success) {
                showToast('Сделка завершена!', 'success');
                await loadMyOrders();
                await loadProfile();
                render();
            } else {
                showToast('Ошибка подтверждения', 'error');
            }
        }

        // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
        function getServerOnline(serverId) {
            return Math.floor(Math.random() * 500) + 100 + (serverId * 7 % 300);
        }

        function getServerItemsCount(serverId) {
            return state.items.filter(i => i.server_id === serverId).length;
        }

        // ========== РЕНДЕР ==========
        function renderServers() {
            let zoomScrollHandler = null;
            setTimeout(() => {
                const plates = document.querySelectorAll('.server-plate');
                const viewportCenterY = window.innerHeight / 2;
                const maxZoomDist = window.innerHeight * 0.48;
                plates.forEach(plate => {
                    const rect = plate.getBoundingClientRect();
                    const plateCenterY = rect.top + rect.height / 2;
                    const distance = Math.abs(plateCenterY - viewportCenterY);
                    const zoomFactor = Math.max(0, 1 - (distance / maxZoomDist));
                    const scale = 1 + (0.16 * Math.pow(zoomFactor, 1.15));
                    plate.style.transform = `scale(${scale.toFixed(3)})`;
                });
            }, 50);
            
            return `<div class="page-enter">
                <div class="header">
                    <div class="header-title">Выбор сервера</div>
                    <div class="btn-icon" onclick="switchTab('profile')">
                        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                </div>
                <div class="servers-grid">
                    ${SERVERS.map((s, i) => {
                        const online = getServerOnline(s.id);
                        const itemsCount = getServerItemsCount(s.id);
                        return `<div class="server-plate stagger-item" style="--srv-color: ${s.color}; animation-delay: ${i * 0.013}s" onclick="selectServer(${s.id}, '${s.color}')">
                            <div><div class="server-plate-name">${s.name}</div><div class="server-stats" style="font-size:11px;color:rgba(255,255,255,0.45);margin-top:6px;"><span>👥 ${online}</span><span>📦 ${itemsCount}</span></div></div>
                            <div class="server-dot"></div>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
        }

        function renderMarket() {
            const cats = [{id:'all',n:'Всё'},{id:'car',n:'Авто'},{id:'realty',n:'Дома'},{id:'skin',n:'Скины'},{id:'money',n:'Валюта'},{id:'service',n:'Услуги'}];
            const filtered = state.items.filter(it => it.name?.toLowerCase().includes(state.search.toLowerCase()) || it.seller_username?.toLowerCase().includes(state.search.toLowerCase()));
            
            return `<div class="page-enter">
                <div class="header">
                    <div class="btn-icon" onclick="switchTab('servers')">
                        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                    </div>
                    <div class="header-title" style="color: var(--active-color); text-shadow: 0 0 20px color-mix(in srgb, var(--active-color) 50%, transparent);">${state.currentServer?.name}</div>
                    <div class="btn-icon" onclick="switchTab('profile')">
                        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                </div>
                
                <div class="tabs-scroll-wrapper stagger-item">
                    <div class="segmented-tabs">
                        ${cats.map(cat => `<div class="tab-item ${state.currentCategory === cat.id ? 'active' : ''}" onclick="setCategory('${cat.id}')">${cat.n}</div>`).join('')}
                    </div>
                </div>
                
                <div class="search-wrap" style="margin-bottom: 16px;">
                    <span class="ico">🔎</span>
                    <input class="search" type="text" placeholder="Поиск по названию или продавцу..." value="${state.search}" oninput="state.search=this.value;render()">
                </div>
                
                ${state.loading ? `<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>` : 
                filtered.length === 0 ? `<div class="glass-relief" style="padding: 60px 20px; text-align:center;">Нет объявлений</div>` : 
                filtered.map((item, idx) => `<div class="glass-relief market-card stagger-item" style="animation-delay: ${(idx % 10) * 0.05}s" onclick="openItem('${item.item_id}')">
                    <div class="card-top">
                        <span class="card-badge">⭐ ${item.seller_rating || 0}</span>
                    </div>
                    <div class="card-title">${item.name}</div>
                    <div class="card-desc">${item.description || 'Описание отсутствует'}</div>
                    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: 20px;">
                        <div class="card-price">${(item.price || 0).toLocaleString()} ₽</div>
                        <div class="buy-mini-btn" onclick="event.stopPropagation();buyItem('${item.item_id}')">Купить</div>
                    </div>
                </div>`).join('')}
                
                <div class="fab-container">
                    <div class="fab-btn" onclick="switchTab('create')">
                        <svg class="svg-icon" viewBox="0 0 24 24" style="width:20px;height:20px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Разместить объявление
                    </div>
                </div>
            </div>`;
        }

        function renderProfile() {
            const u = state.user || { first_name: 'Загрузка...', rating: 0, deals: 0, seller_deals: 0, buyer_deals: 0 };
            const rank = u.deals >= 50 ? { name: 'Легенда', clr: '#FF2D55' } : u.deals >= 20 ? { name: 'Мастер', clr: '#BF5AF2' } : u.deals >= 5 ? { name: 'Торговец', clr: '#0A84FF' } : { name: 'Новичок', clr: '#34C759' };
            
            return `<div class="page-enter">
                <div class="header">
                    <div class="btn-icon" onclick="switchTab('servers')">
                        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                    </div>
                    <div class="header-title">Профиль</div>
                    <div style="width:48px;"></div>
                </div>
                
                <div class="stagger-item">
                    <div class="hologram-avatar">${u.first_name?.charAt(0) || '👤'}</div>
                    <div style="text-align: center; margin-bottom: 40px;">
                        <h2 style="font-size: 32px; font-weight: 800; margin-bottom: 8px;">${u.first_name}</h2>
                        <div style="display:inline-block; padding: 6px 16px; border-radius: 20px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: ${rank.clr}; font-weight: 800; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8);">${rank.name}</div>
                    </div>
                </div>
                
                <div style="display:flex; gap: 16px; margin-bottom: 24px;">
                    <div class="glass-relief" style="flex:1; padding: 24px; text-align:center;">
                        <div style="font-size: 36px; font-weight: 900; margin-bottom: 8px;">${u.rating || 0}</div>
                        <div style="color: var(--text-muted); font-size: 13px; font-weight: 700;">Рейтинг</div>
                    </div>
                    <div class="glass-relief" style="flex:1; padding: 24px; text-align:center;">
                        <div style="font-size: 36px; font-weight: 900; margin-bottom: 8px;">${u.deals || 0}</div>
                        <div style="color: var(--text-muted); font-size: 13px; font-weight: 700;">Сделок</div>
                    </div>
                </div>
                
                <div style="display:flex; gap: 16px; margin-bottom: 24px;">
                    <div class="glass-relief" style="flex:1; padding: 20px; text-align:center;">
                        <div style="font-size: 24px; font-weight: 800;">${u.seller_deals || 0}</div>
                        <div style="color: var(--text-muted); font-size: 11px;">Продаж</div>
                    </div>
                    <div class="glass-relief" style="flex:1; padding: 20px; text-align:center;">
                        <div style="font-size: 24px; font-weight: 800;">${u.buyer_deals || 0}</div>
                        <div style="color: var(--text-muted); font-size: 11px;">Покупок</div>
                    </div>
                </div>
                
                <div class="glass-relief" style="padding: 8px; margin-bottom: 16px;">
                    <button class="btn-3d" style="background: transparent; box-shadow: none; border: none; justify-content: space-between;" onclick="switchTab('orders')">
                        <span>Мои сделки</span>
                        <span style="background: var(--active-color); padding: 4px 12px; border-radius: 12px; font-size: 14px;">${state.myOrders.length}</span>
                    </button>
                </div>
                
                <button class="btn-3d" onclick="switchTab('create')">➕ Продать товар</button>
            </div>`;
        }

        function renderOrders() {
            if (state.myOrders.length === 0) {
                return `<div class="page-enter">
                    <div class="header">
                        <div class="btn-icon" onclick="switchTab('profile')">
                            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                        </div>
                        <div class="header-title">Сделки</div>
                        <div style="width:48px;"></div>
                    </div>
                    <div class="glass-relief" style="padding: 60px; text-align:center;">Нет сделок</div>
                </div>`;
            }
            
            return `<div class="page-enter">
                <div class="header">
                    <div class="btn-icon" onclick="switchTab('profile')">
                        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                    </div>
                    <div class="header-title">Сделки</div>
                    <div class="btn-icon" onclick="loadMyOrders()">
                        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                    </div>
                </div>
                ${state.myOrders.map(order => `<div class="glass-relief market-card" style="cursor: default;">
                    <div class="card-top">
                        <span class="card-badge" style="color: ${order.status === 'completed' ? '#34C759' : '#FF9500'}; border-color: ${order.status === 'completed' ? '#34C759' : '#FF9500'};">${order.status === 'pending' ? 'Ожидание' : 'Выполнено'}</span>
                    </div>
                    <div class="card-title">${order.item_name}</div>
                    <div class="card-desc">Контрагент: @${order.other_user}</div>
                    <div class="card-price" style="margin-bottom: 20px;">${(order.price || 0).toLocaleString()} ₽</div>
                    ${order.status === 'pending' && order.is_buyer ? `<button class="btn-3d" onclick="confirmOrder('${order.order_id}')">Подтвердить получение</button>` : ''}
                </div>`).join('')}
            </div>`;
        }

        function renderCreateForm() {
            return `<div class="page-enter">
                <div class="header">
                    <div class="btn-icon" onclick="switchTab('market')">
                        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                    </div>
                    <div class="header-title">Продажа</div>
                    <div style="width:48px;"></div>
                </div>
                
                <div class="glass-relief" style="padding: 24px;">
                    <div class="input-group">
                        <select id="catSelect" class="glass-input">
                            <option value="car">🚗 Машина</option>
                            <option value="realty">🏠 Дом</option>
                            <option value="skin">🎨 Скин</option>
                            <option value="money">💰 Валюта</option>
                            <option value="service">⚙️ Услуга</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <input type="text" id="itemName" class="glass-input" placeholder="Название товара">
                    </div>
                    <div class="input-group">
                        <textarea id="itemDesc" class="glass-input" rows="3" placeholder="Описание"></textarea>
                    </div>
                    <div class="input-group">
                        <input type="number" id="itemPrice" class="glass-input" placeholder="Цена (₽)">
                    </div>
                    
                    <div class="glass-relief" style="display:flex; justify-content:space-between; align-items:center; padding: 20px; margin-bottom: 24px;">
                        <span style="font-weight: 700;">Доступен торг</span>
                        <input type="checkbox" id="itemBargain" class="toggle-ios" checked>
                    </div>
                    
                    <button class="btn-3d" onclick="submitCreate()">Опубликовать лот</button>
                </div>
            </div>`;
        }

        // ========== ГЛОБАЛЬНЫЕ ФУНКЦИИ ==========
        window.switchTab = (tab) => {
            state.tab = tab;
            if (tab === 'profile') { loadProfile(); loadMyOrders(); }
            if (tab === 'orders') loadMyOrders();
            if (tab === 'market' && state.currentServer) loadItems();
            render();
            updateTabs();
        };

        window.selectServer = (id, color) => {
            state.currentServer = SERVERS.find(s => s.id === id);
            document.documentElement.style.setProperty('--active-color', color);
            state.tab = 'market';
            loadItems();
            render();
            updateTabs();
        };

        window.setCategory = (cat) => {
            state.currentCategory = cat;
            loadItems();
        };

        window.openItem = (id) => { tg.showAlert('Подробнее в разработке'); };
        window.buyItem = buyItem;
        window.confirmOrder = confirmOrder;

        window.submitCreate = async () => {
            const name = document.getElementById('itemName')?.value;
            const price = parseInt(document.getElementById('itemPrice')?.value);
            if (!name || !price) { showToast('Заполните название и цену', 'error'); return; }
            await createItem({
                server_id: state.currentServer.id,
                server_name: state.currentServer.name,
                server_color: state.currentServer.color,
                category: document.getElementById('catSelect')?.value,
                name: name,
                description: document.getElementById('itemDesc')?.value || '',
                price: price,
                bargain: document.getElementById('itemBargain')?.checked || false
            });
        };

        function updateTabs() {
            const tabs = ['servers', 'market', 'profile'];
            const icons = { servers: '🌐', market: '🛒', profile: '👤' };
            const labels = { servers: 'Серверы', market: 'Маркет', profile: 'Профиль' };
            document.getElementById('tabBar').innerHTML = tabs.map(t => `<div class="tab-item ${state.tab === t ? 'active' : ''}" onclick="switchTab('${t}')"><div class="tab-ico">${icons[t]}</div><div class="tab-lbl">${labels[t]}</div></div>`).join('');
        }

        function render() {
            const views = { servers: renderServers, market: renderMarket, profile: renderProfile, orders: renderOrders, create: renderCreateForm };
            document.getElementById('app').innerHTML = (views[state.tab] || renderServers)();
            updateTabs();
            
            if (state.tab === 'servers') {
                setTimeout(() => {
                    const plates = document.querySelectorAll('.server-plate');
                    const viewportCenterY = window.innerHeight / 2;
                    const maxZoomDist = window.innerHeight * 0.48;
                    plates.forEach(plate => {
                        const rect = plate.getBoundingClientRect();
                        const plateCenterY = rect.top + rect.height / 2;
                        const distance = Math.abs(plateCenterY - viewportCenterY);
                        const zoomFactor = Math.max(0, 1 - (distance / maxZoomDist));
                        const scale = 1 + (0.16 * Math.pow(zoomFactor, 1.15));
                        plate.style.transform = `scale(${scale.toFixed(3)})`;
                    });
                }, 50);
            }
        }

        loadProfile();
        loadMyOrders();
        render();
    </script>
</body>
</html>
